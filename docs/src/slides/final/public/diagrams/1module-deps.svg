<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-dep" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="920" height="430" rx="10" fill="#f8fafc" stroke="#bae6fd" stroke-width="1"/>

  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#0369a1">模块依赖关系</text>

  <!-- ===== L1: 入口层（y=48, h=42, w=180） ===== -->
  <!-- daemon 覆盖 collector+core 区域 -->
  <rect x="130" y="48" width="180" height="42" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="220" y="70" text-anchor="middle" font-size="10.5" font-weight="700" fill="#475569">aios-daemon</text>
  <text x="220" y="84" text-anchor="middle" font-size="7.5" fill="#64748b">dipecsd · 管线 · 画像摘要</text>

  <!-- cli 覆盖 agent+action 区域 -->
  <rect x="610" y="48" width="180" height="42" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="700" y="70" text-anchor="middle" font-size="10.5" font-weight="700" fill="#475569">aios-cli</text>
  <text x="700" y="84" text-anchor="middle" font-size="7.5" fill="#64748b">replay · send_action · audit</text>

  <!-- ===== L2: 业务层（y=160, h=66, w=170, gap=30） ===== -->
  <rect x="40" y="160" width="170" height="66" rx="7" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="0.8"/>
  <text x="125" y="186" text-anchor="middle" font-size="11" font-weight="700" fill="#075985">aios-collector</text>
  <text x="125" y="202" text-anchor="middle" font-size="8" fill="#0e7490">JSONL · proc · binder</text>
  <text x="125" y="216" text-anchor="middle" font-size="8" fill="#0e7490">系统状态 · 文件监控</text>

  <rect x="240" y="160" width="170" height="66" rx="7" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="325" y="186" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">aios-core</text>
  <text x="325" y="202" text-anchor="middle" font-size="8" fill="#1d4ed8">隐私气隙 · 窗口聚合 · 策略引擎</text>
  <text x="325" y="216" text-anchor="middle" font-size="8" fill="#1d4ed8">动作生命周期 · 上下文记忆</text>

  <rect x="440" y="160" width="170" height="66" rx="7" fill="#f0fdf4" stroke="#86efac" stroke-width="0.8"/>
  <text x="525" y="186" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">aios-agent</text>
  <text x="525" y="202" text-anchor="middle" font-size="8" fill="#15803d">决策路由器</text>
  <text x="525" y="216" text-anchor="middle" font-size="8" fill="#15803d">规则 · 本地评估 · 云端 · 兜底</text>

  <rect x="640" y="160" width="170" height="66" rx="7" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="0.8"/>
  <text x="725" y="186" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">aios-action</text>
  <text x="725" y="202" text-anchor="middle" font-size="8" fill="#7c3aed">离线适配器 · 桌面执行器</text>
  <text x="725" y="216" text-anchor="middle" font-size="8" fill="#7c3aed">Android 适配器</text>

  <!-- ===== L3: 基础层（y=322, h=44, w=500） ===== -->
  <rect x="190" y="322" width="500" height="44" rx="7" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.6"/>
  <text x="440" y="344" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">aios-spec</text>
  <text x="440" y="359" text-anchor="middle" font-size="8" fill="#a16207">零依赖 · 跨模块类型 + trait 定义 · IPC 协议</text>

  <!-- ===== Dependencies: L1 → L2 ===== -->
  <!-- 上频段（y=106..110）：daemon 扇出 -->
  <path d="M220,90 L220,106 L125,106 L125,155" fill="none" stroke="#94a3b8" stroke-width="1.1" marker-end="url(#arrow-dep)"/>
  <path d="M220,90 L220,108 L325,108 L325,155" fill="none" stroke="#94a3b8" stroke-width="1.1" marker-end="url(#arrow-dep)"/>
  <path d="M220,90 L220,110 L525,110 L525,155" fill="none" stroke="#94a3b8" stroke-width="1.1" marker-end="url(#arrow-dep)"/>

  <!-- daemon → action：从 daemon 中心下穿到 y=128，再过到 action -->
  <path d="M220,90 L220,142 L725,142 L725,155" fill="none" stroke="#94a3b8" stroke-width="1.1" marker-end="url(#arrow-dep)"/>

  <!-- 下频段（y=116..120）：cli 扇出 -->
  <path d="M700,90 L700,116 L325,116 L325,155" fill="none" stroke="#94a3b8" stroke-width="1.1" marker-end="url(#arrow-dep)"/>
  <path d="M700,90 L700,118 L525,118 L525,155" fill="none" stroke="#94a3b8" stroke-width="1.1" marker-end="url(#arrow-dep)"/>
  <path d="M700,90 L700,120 L725,120 L725,155" fill="none" stroke="#94a3b8" stroke-width="1.1" marker-end="url(#arrow-dep)"/>

  <!-- ===== Dependencies: L2 → L2（action → core）= ==== -->
  <!-- 在 action 右侧绕出，下行到 y=270，回穿到 core -->
  <path d="M810,200 L840,200 L840,290 L325,290 L325,222" fill="none" stroke="#94a3b8" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#arrow-dep)"/>

  <!-- ===== Dependencies: L2 → L3 ===== -->
  <!-- 水平汇流条 y=276，每个业务模块一条垂直线接入 -->
  <line x1="125" y1="276" x2="725" y2="276" stroke="#94a3b8" stroke-width="1.1"/>
  <path d="M125,226 L125,276" fill="none" stroke="#94a3b8" stroke-width="1.1"/>
  <path d="M325,226 L325,276" fill="none" stroke="#94a3b8" stroke-width="1.1"/>
  <path d="M525,226 L525,276" fill="none" stroke="#94a3b8" stroke-width="1.1"/>
  <path d="M725,226 L725,276" fill="none" stroke="#94a3b8" stroke-width="1.1"/>
  <!-- 汇流条 → spec 的唯一下落 -->
  <line x1="440" y1="276" x2="440" y2="317" stroke="#94a3b8" stroke-width="1.1" marker-end="url(#arrow-dep)"/>

  <!-- ===== 图例 ===== -->
  <g transform="translate(40, 388)">
    <rect x="0" y="0" width="10" height="10" rx="2" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="0.3"/>
    <text x="14" y="9" font-size="7.5" fill="#64748b">采集</text>

    <rect x="50" y="0" width="10" height="10" rx="2" fill="#dbeafe" stroke="#60a5fa" stroke-width="0.3"/>
    <text x="64" y="9" font-size="7.5" fill="#64748b">核心引擎</text>

    <rect x="120" y="0" width="10" height="10" rx="2" fill="#f0fdf4" stroke="#86efac" stroke-width="0.3"/>
    <text x="134" y="9" font-size="7.5" fill="#64748b">决策</text>

    <rect x="170" y="0" width="10" height="10" rx="2" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="0.3"/>
    <text x="184" y="9" font-size="7.5" fill="#64748b">执行</text>

    <rect x="220" y="0" width="10" height="10" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="0.3"/>
    <text x="234" y="9" font-size="7.5" fill="#64748b">协议层</text>

    <rect x="280" y="0" width="10" height="10" rx="2" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.3"/>
    <text x="294" y="9" font-size="7.5" fill="#64748b">入口层</text>

    <!-- 虚线 = 模块间直接依赖 -->
    <path d="M340,5 L370,5" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="376" y="9" font-size="7.5" fill="#64748b">模块间直接依赖</text>
  </g>
</svg>
