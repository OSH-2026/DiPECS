<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-muted" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#94a3b8"/>
    </marker>
    <style><![CDATA[
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 22px; font-weight: 800; fill: #0f172a; }
      .label { font-size: 13px; font-weight: 750; }
      .small { font-size: 11px; }
      .tiny { font-size: 10px; }
      .muted { fill: #64748b; }
      .box { stroke-width: 1.2; }
      .soft { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.1; }
      .lane-title { font-size: 13px; font-weight: 800; fill: #334155; }
    ]]></style>
  </defs>

  <rect width="960" height="540" rx="16" fill="#f8fafc" stroke="#dbeafe" stroke-width="1.4"/>
  <text x="480" y="34" text-anchor="middle" class="title">PolicyEngine：模型建议不是权限</text>
  <rect x="56" y="92" width="164" height="60" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box" />
  <text x="138.0" y="116" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="800">ActionProposal</text>
  <text x="138.0" y="137" text-anchor="middle" font-size="11" fill="#1e40af">类型 / 目标 / 置信度</text>
  <text x="138.0" y="152" text-anchor="middle" font-size="11" fill="#1e40af">风险 / 紧急度</text>
  <line x1="220" y1="122" x2="270" y2="122" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="270" y="92" width="174" height="60" rx="10" fill="#ffe4e6" stroke="#fda4af" class="box" />
  <text x="357.0" y="116" text-anchor="middle" font-size="12" fill="#9f1239" font-weight="800">PolicyEngine</text>
  <text x="357.0" y="137" text-anchor="middle" font-size="11" fill="#9f1239">顺序检查</text>
  <text x="357.0" y="152" text-anchor="middle" font-size="11" fill="#9f1239">任一失败即拒绝</text>
  <line x1="444" y1="122" x2="500" y2="122" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="76" y="198" width="160" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box" />
  <text x="156.0" y="222" text-anchor="middle" font-size="12" fill="#334155" font-weight="800">1. 风险能力</text>
  <line x1="236" y1="219" x2="270" y2="219" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <rect x="280" y="198" width="160" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box" />
  <text x="360.0" y="222" text-anchor="middle" font-size="12" fill="#334155" font-weight="800">2. 风险配置</text>
  <line x1="440" y1="219" x2="474" y2="219" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <rect x="484" y="198" width="160" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box" />
  <text x="564.0" y="222" text-anchor="middle" font-size="12" fill="#334155" font-weight="800">3. 置信度</text>
  <line x1="644" y1="219" x2="678" y2="219" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <rect x="688" y="198" width="160" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box" />
  <text x="768.0" y="222" text-anchor="middle" font-size="12" fill="#334155" font-weight="800">4. 批量上限</text>
  <path d="M768,240 L768,254 L76,254 L76,268" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <rect x="76" y="268" width="160" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box" />
  <text x="156.0" y="292" text-anchor="middle" font-size="12" fill="#334155" font-weight="800">5. 阻止列表</text>
  <line x1="236" y1="289" x2="270" y2="289" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <rect x="280" y="268" width="160" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box" />
  <text x="360.0" y="292" text-anchor="middle" font-size="12" fill="#334155" font-weight="800">6. 延迟拒绝</text>
  <line x1="440" y1="289" x2="474" y2="289" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <rect x="484" y="268" width="160" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box" />
  <text x="564.0" y="292" text-anchor="middle" font-size="12" fill="#334155" font-weight="800">7. 动作能力</text>
  <line x1="644" y1="289" x2="678" y2="289" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <rect x="688" y="268" width="160" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box" />
  <text x="768.0" y="292" text-anchor="middle" font-size="12" fill="#334155" font-weight="800">8. 目标匹配</text>
  <rect x="500" y="92" width="174" height="60" rx="10" fill="#dcfce7" stroke="#86efac" class="box" />
  <text x="587.0" y="116" text-anchor="middle" font-size="12" fill="#166534" font-weight="800">KnownTargets</text>
  <text x="587.0" y="137" text-anchor="middle" font-size="11" fill="#166534">从当前上下文推导</text>
  <text x="587.0" y="152" text-anchor="middle" font-size="11" fill="#166534">pkg / url / cache 前缀</text>
  <rect x="704" y="92" width="174" height="60" rx="10" fill="#fef3c7" stroke="#fbbf24" class="box" />
  <text x="791.0" y="116" text-anchor="middle" font-size="12" fill="#92400e" font-weight="800">PolicyConfig</text>
  <text x="791.0" y="137" text-anchor="middle" font-size="11" fill="#92400e">低风险上限</text>
  <text x="791.0" y="152" text-anchor="middle" font-size="11" fill="#92400e">min confidence=0.3</text>
  <line x1="446" y1="260" x2="446" y2="330" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="224" y="330" width="210" height="62" rx="10" fill="#dcfce7" stroke="#86efac" class="box" />
  <text x="329.0" y="354" text-anchor="middle" font-size="13" fill="#166534" font-weight="800">Approved</text>
  <text x="329.0" y="375" text-anchor="middle" font-size="11" fill="#166534">seal() -&gt; AuthorizedAction</text>
  <text x="329.0" y="390" text-anchor="middle" font-size="11" fill="#166534">进入生命周期执行</text>
  <rect x="524" y="330" width="210" height="62" rx="10" fill="#ffe4e6" stroke="#fda4af" class="box" />
  <text x="629.0" y="354" text-anchor="middle" font-size="13" fill="#9f1239" font-weight="800">Denied</text>
  <text x="629.0" y="375" text-anchor="middle" font-size="11" fill="#9f1239">写入拒绝原因</text>
  <text x="629.0" y="390" text-anchor="middle" font-size="11" fill="#9f1239">同样进入审计</text>
  <path d="M446,260 L330,260 L330,330" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <path d="M446,260 L630,260 L630,330" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <rect x="250" y="430" width="460" height="52" rx="10" fill="#ede9fe" stroke="#c4b5fd" class="box" />
  <text x="480.0" y="454" text-anchor="middle" font-size="13" fill="#5b21b6" font-weight="800">PolicyActionDecision</text>
  <text x="480.0" y="475" text-anchor="middle" font-size="11" fill="#5b21b6">Approved 或 Denied 都带完整坐标、检查结果和原因，便于回放比较</text>
</svg>
