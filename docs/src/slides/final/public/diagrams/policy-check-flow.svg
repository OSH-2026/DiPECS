<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <marker id="arrow-blue" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-muted" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#e11d48"/>
    </marker>
    <style><![CDATA[
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 22px; font-weight: 800; fill: #0f172a; }
      .box { stroke-width: 1.25; }
      .check-title { font-size: 12px; font-weight: 800; fill: #334155; }
      .check-sub { font-size: 10.5px; fill: #64748b; }
      .note { font-size: 10.5px; fill: #64748b; }
    ]]></style>
  </defs>

  <rect width="960" height="540" rx="16" fill="#f8fafc" stroke="#dbeafe" stroke-width="1.4"/>
  <text x="480" y="36" text-anchor="middle" class="title">PolicyEngine：模型建议需经授权</text>

  <!-- Inputs -->
  <rect x="70" y="82" width="164" height="60" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box"/>
  <text x="152" y="106" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="800">ActionProposal</text>
  <text x="152" y="126" text-anchor="middle" font-size="11" fill="#1e40af">类型 / 目标 / 置信度</text>
  <text x="152" y="141" text-anchor="middle" font-size="11" fill="#1e40af">风险 / 紧急度</text>

  <rect x="306" y="82" width="174" height="60" rx="10" fill="#ffe4e6" stroke="#fda4af" class="box"/>
  <text x="393" y="106" text-anchor="middle" font-size="12" fill="#9f1239" font-weight="800">PolicyEngine</text>
  <text x="393" y="126" text-anchor="middle" font-size="11" fill="#9f1239">顺序检查</text>
  <text x="393" y="141" text-anchor="middle" font-size="11" fill="#9f1239">任一失败即拒绝</text>

  <rect x="542" y="82" width="174" height="60" rx="10" fill="#dcfce7" stroke="#86efac" class="box"/>
  <text x="629" y="106" text-anchor="middle" font-size="12" fill="#166534" font-weight="800">KnownTargets</text>
  <text x="629" y="126" text-anchor="middle" font-size="11" fill="#166534">从当前上下文推导</text>
  <text x="629" y="141" text-anchor="middle" font-size="11" fill="#166534">pkg / url / cache 前缀</text>

  <rect x="746" y="82" width="164" height="60" rx="10" fill="#fef3c7" stroke="#fbbf24" class="box"/>
  <text x="828" y="106" text-anchor="middle" font-size="12" fill="#92400e" font-weight="800">PolicyConfig</text>
  <text x="828" y="126" text-anchor="middle" font-size="11" fill="#92400e">低风险上限</text>
  <text x="828" y="141" text-anchor="middle" font-size="11" fill="#92400e">min confidence = 0.3</text>

  <line x1="234" y1="112" x2="298" y2="112" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="480" y1="112" x2="534" y2="112" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M629,142 L629,164 L478,164" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5 5" marker-end="url(#arrow-muted)"/>
  <path d="M828,142 L828,164 L478,164" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5 5" marker-end="url(#arrow-muted)"/>

  <!-- Sequential checks -->
  <rect x="54" y="184" width="852" height="156" rx="14" fill="#ffffff" stroke="#dbeafe" stroke-width="1.2"/>
  <text x="480" y="208" text-anchor="middle" font-size="14" fill="#0f172a" font-weight="800">八项检查按顺序执行：fail closed</text>

  <rect x="82" y="230" width="156" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box"/>
  <text x="160" y="254" text-anchor="middle" class="check-title">1. 风险能力</text>
  <line x1="238" y1="251" x2="274" y2="251" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>

  <rect x="282" y="230" width="156" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box"/>
  <text x="360" y="254" text-anchor="middle" class="check-title">2. 风险配置</text>
  <line x1="438" y1="251" x2="474" y2="251" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>

  <rect x="482" y="230" width="156" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box"/>
  <text x="560" y="254" text-anchor="middle" class="check-title">3. 置信度</text>
  <line x1="638" y1="251" x2="674" y2="251" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>

  <rect x="682" y="230" width="156" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box"/>
  <text x="760" y="254" text-anchor="middle" class="check-title">4. 批量上限</text>

  <path d="M760,272 L760,288 L160,288 L160,302" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>

  <rect x="82" y="302" width="156" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box"/>
  <text x="160" y="326" text-anchor="middle" class="check-title">5. 阻止列表</text>
  <line x1="238" y1="323" x2="274" y2="323" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>

  <rect x="282" y="302" width="156" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box"/>
  <text x="360" y="326" text-anchor="middle" class="check-title">6. 延迟拒绝</text>
  <line x1="438" y1="323" x2="474" y2="323" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>

  <rect x="482" y="302" width="156" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box"/>
  <text x="560" y="326" text-anchor="middle" class="check-title">7. 动作能力</text>
  <line x1="638" y1="323" x2="674" y2="323" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>

  <rect x="682" y="302" width="156" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box"/>
  <text x="760" y="326" text-anchor="middle" class="check-title">8. 目标匹配</text>

  <!-- Decision split -->
  <line x1="760" y1="344" x2="760" y2="370" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <rect x="690" y="370" width="140" height="44" rx="10" fill="#eef2ff" stroke="#93c5fd" class="box"/>
  <text x="760" y="391" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="800">全部通过？</text>
  <text x="760" y="407" text-anchor="middle" class="check-sub">统一产生决策</text>

  <rect x="210" y="430" width="230" height="62" rx="10" fill="#dcfce7" stroke="#86efac" class="box"/>
  <text x="325" y="454" text-anchor="middle" font-size="13" fill="#166534" font-weight="800">Approved</text>
  <text x="325" y="475" text-anchor="middle" font-size="11" fill="#166534">seal() → AuthorizedAction</text>
  <text x="325" y="490" text-anchor="middle" font-size="11" fill="#166534">进入生命周期执行</text>

  <rect x="520" y="430" width="230" height="62" rx="10" fill="#ffe4e6" stroke="#fda4af" class="box"/>
  <text x="635" y="454" text-anchor="middle" font-size="13" fill="#9f1239" font-weight="800">Denied</text>
  <text x="635" y="475" text-anchor="middle" font-size="11" fill="#9f1239">写入拒绝原因</text>
  <text x="635" y="490" text-anchor="middle" font-size="11" fill="#9f1239">同样进入审计</text>

  <path d="M724,414 L410,430" fill="none" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrow-green)"/>
  <path d="M760,414 L650,430" fill="none" stroke="#e11d48" stroke-width="2.2" marker-end="url(#arrow-red)"/>
  <text x="546" y="422" text-anchor="middle" font-size="10.5" fill="#166534">是</text>
  <text x="704" y="426" text-anchor="middle" font-size="10.5" fill="#9f1239">否 / 任一失败</text>

  <rect x="250" y="504" width="460" height="24" rx="8" fill="#ede9fe" stroke="#c4b5fd" class="box"/>
  <text x="480" y="521" text-anchor="middle" font-size="10.5" fill="#5b21b6">PolicyActionDecision 同时携带检查结果、拒绝原因与审计坐标，便于回放比较</text>
</svg>
