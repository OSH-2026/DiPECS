<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-muted" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#94a3b8"/>
    </marker>
    <style><![CDATA[
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 22px; font-weight: 800; fill: #0f172a; }
      .label { font-size: 13px; font-weight: 750; }
      .small { font-size: 11px; }
      .tiny { font-size: 10px; }
      .muted { fill: #64748b; }
      .box { stroke-width: 1.2; }
      .soft { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.1; }
      .lane-title { font-size: 13px; font-weight: 800; fill: #334155; }
    ]]></style>
  </defs>

  <rect width="960" height="540" rx="16" fill="#f8fafc" stroke="#dbeafe" stroke-width="1.4"/>
  <text x="480" y="34" text-anchor="middle" class="title">通知文本脱敏：从原始通知到语义提示</text>
  <rect x="46" y="78" width="300" height="210" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="64" y="102" text-anchor="start" font-size="13" fill="#334155" font-weight="800">原始通知</text>
  <rect x="76" y="124" width="240" height="58" rx="10" fill="#ffe4e6" stroke="#fda4af" class="box" />
  <text x="196.0" y="148" text-anchor="middle" font-size="12" fill="#9f1239" font-weight="800">标题 / 正文</text>
  <text x="196.0" y="169" text-anchor="middle" font-size="11" fill="#9f1239">联系人、时间、地点、合同信息</text>
  <text x="196.0" y="184" text-anchor="middle" font-size="11" fill="#9f1239">属于隐私原文</text>
  <rect x="76" y="204" width="240" height="46" rx="10" fill="#ffe4e6" stroke="#fda4af" class="box" />
  <text x="196.0" y="228" text-anchor="middle" font-size="12" fill="#9f1239" font-weight="800">通知键 / 分组键</text>
  <text x="196.0" y="249" text-anchor="middle" font-size="11" fill="#9f1239">渠道标识与 Binder 负载直接丢弃</text>
  <rect x="392" y="92" width="74" height="182" rx="14" fill="#ffe4e6" stroke="#fda4af" class="box" />
  <text x="429" y="154" text-anchor="middle" font-size="16" fill="#9f1239" font-weight="800">隐私气隙</text>
  <line x1="346" y1="182" x2="392" y2="182" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="466" y1="182" x2="512" y2="182" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="512" y="78" width="402" height="210" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="530" y="102" text-anchor="start" font-size="13" fill="#334155" font-weight="800">脱敏输出</text>
  <rect x="542" y="124" width="154" height="58" rx="10" fill="#dcfce7" stroke="#86efac" class="box" />
  <text x="619.0" y="148" text-anchor="middle" font-size="12" fill="#166534" font-weight="800">TextHint 标题</text>
  <text x="619.0" y="169" text-anchor="middle" font-size="11" fill="#166534">长度、书写系统</text>
  <text x="619.0" y="184" text-anchor="middle" font-size="11" fill="#166534">是否纯 Emoji</text>
  <rect x="728" y="124" width="154" height="58" rx="10" fill="#dcfce7" stroke="#86efac" class="box" />
  <text x="805.0" y="148" text-anchor="middle" font-size="12" fill="#166534" font-weight="800">TextHint 正文</text>
  <text x="805.0" y="169" text-anchor="middle" font-size="11" fill="#166534">长度、书写系统</text>
  <text x="805.0" y="184" text-anchor="middle" font-size="11" fill="#166534">是否纯 Emoji</text>
  <rect x="542" y="208" width="340" height="42" rx="10" fill="#dcfce7" stroke="#86efac" class="box" />
  <text x="712.0" y="232" text-anchor="middle" font-size="12" fill="#166534" font-weight="800">SemanticHint</text>
  <text x="712.0" y="253" text-anchor="middle" font-size="11" fill="#166534">日历、链接、文件等本地关键词提示；不上传原文</text>
  <rect x="72" y="322" width="816" height="110" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="90" y="346" text-anchor="start" font-size="13" fill="#334155" font-weight="800">语义提示分类</text>
  <rect x="102" y="360" width="80" height="28" rx="7" fill="#dcfce7" stroke="#86efac" class="box" />
  <text x="142.0" y="379" text-anchor="middle" font-size="11" fill="#166534" font-weight="700">文件</text>
  <rect x="196" y="360" width="80" height="28" rx="7" fill="#dcfce7" stroke="#86efac" class="box" />
  <text x="236.0" y="379" text-anchor="middle" font-size="11" fill="#166534" font-weight="700">图片</text>
  <rect x="290" y="360" width="80" height="28" rx="7" fill="#dcfce7" stroke="#86efac" class="box" />
  <text x="330.0" y="379" text-anchor="middle" font-size="11" fill="#166534" font-weight="700">语音消息</text>
  <rect x="384" y="360" width="80" height="28" rx="7" fill="#dcfce7" stroke="#86efac" class="box" />
  <text x="424.0" y="379" text-anchor="middle" font-size="11" fill="#166534" font-weight="700">链接</text>
  <rect x="478" y="360" width="80" height="28" rx="7" fill="#dcfce7" stroke="#86efac" class="box" />
  <text x="518.0" y="379" text-anchor="middle" font-size="11" fill="#166534" font-weight="700">日历</text>
  <rect x="572" y="360" width="80" height="28" rx="7" fill="#dcfce7" stroke="#86efac" class="box" />
  <text x="612.0" y="379" text-anchor="middle" font-size="11" fill="#166534" font-weight="700">用户提及</text>
  <rect x="666" y="360" width="80" height="28" rx="7" fill="#ffe4e6" stroke="#fda4af" class="box" />
  <text x="706.0" y="379" text-anchor="middle" font-size="11" fill="#9f1239" font-weight="700">验证码</text>
  <rect x="760" y="360" width="80" height="28" rx="7" fill="#dcfce7" stroke="#86efac" class="box" />
  <text x="800.0" y="379" text-anchor="middle" font-size="11" fill="#166534" font-weight="700">金融</text>
  <rect x="198" y="448" width="564" height="44" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box" />
  <text x="480.0" y="472" text-anchor="middle" font-size="13" fill="#1e40af" font-weight="800">TextHint 维度</text>
  <text x="480.0" y="493" text-anchor="middle" font-size="11" fill="#1e40af">字符长度 | Latin/CJK/Cyrillic/Arabic/Mixed | 是否纯 Emoji</text>
  <text x="480" y="512" text-anchor="middle" font-size="12" fill="#9f1239" font-weight="800">输出只保留统计量和类别提示，原文、路径、键值没有反向恢复路径</text>
</svg>
