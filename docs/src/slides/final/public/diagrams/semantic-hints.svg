<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-red" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="800" height="350" rx="10" fill="#f8fafc" stroke="#bae6fd" stroke-width="1"/>

  <text x="400" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#0369a1">通知文本脱敏：从原始通知到语义提示</text>

  <!-- Left: Raw notification -->
  <rect x="25" y="44" width="300" height="170" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.2"/>
  <text x="175" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">原始通知</text>

  <rect x="40" y="82" width="270" height="52" rx="5" fill="#fff" stroke="#fca5a5" stroke-width="0.8"/>
  <text x="175" y="100" text-anchor="middle" font-size="9" fill="#b91c1c">标题："张三发来一条消息"（8 字）</text>
  <text x="175" y="116" text-anchor="middle" font-size="9" fill="#b91c1c">正文："明天下午3点老地方见..."（18 字）</text>
  <text x="175" y="130" text-anchor="middle" font-size="9" fill="#b91c1c">（联系人姓名、地点、合同信息 = 隐私信息）</text>

  <rect x="40" y="142" width="270" height="42" rx="5" fill="#fff" stroke="#fca5a5" stroke-width="0.8"/>
  <text x="175" y="158" text-anchor="middle" font-size="9" fill="#b91c1c">分组键："contact_zhangsan"</text>
  <text x="175" y="174" text-anchor="middle" font-size="9" fill="#b91c1c">渠道标识："chat_messages" → 全部丢弃</text>

  <text x="175" y="202" text-anchor="middle" font-size="8" fill="#b91c1c">（通知键、分组键、Binder负载等敏感字段直接丢弃）</text>

  <!-- Arrow through air gap -->
  <line x1="325" y1="129" x2="368" y2="129" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- PrivacyAirGap wall -->
  <rect x="333" y="44" width="38" height="170" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="352" y="90" text-anchor="middle" font-size="10" font-weight="800" fill="#dc2626">隐</text>
  <text x="352" y="110" text-anchor="middle" font-size="10" font-weight="800" fill="#dc2626">私</text>
  <text x="352" y="130" text-anchor="middle" font-size="10" font-weight="800" fill="#dc2626">气</text>
  <text x="352" y="150" text-anchor="middle" font-size="10" font-weight="800" fill="#dc2626">隙</text>

  <line x1="371" y1="129" x2="405" y2="129" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Right: Sanitized output -->
  <rect x="410" y="44" width="365" height="170" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="592" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">脱敏输出</text>

  <!-- TextHint title -->
  <rect x="425" y="82" width="160" height="56" rx="5" fill="#fff" stroke="#86efac" stroke-width="0.8"/>
  <text x="505" y="100" text-anchor="middle" font-size="9" font-weight="700" fill="#166534">文本提示（标题）</text>
  <text x="505" y="116" text-anchor="middle" font-size="8" fill="#15803d">长度：8 字符</text>
  <text x="505" y="132" text-anchor="middle" font-size="8" fill="#15803d">书写系统：中日韩 · 纯表情：否</text>

  <!-- TextHint body -->
  <rect x="595" y="82" width="165" height="56" rx="5" fill="#fff" stroke="#86efac" stroke-width="0.8"/>
  <text x="677" y="100" text-anchor="middle" font-size="9" font-weight="700" fill="#166534">文本提示（正文）</text>
  <text x="677" y="116" text-anchor="middle" font-size="8" fill="#15803d">长度：18 字符</text>
  <text x="677" y="132" text-anchor="middle" font-size="8" fill="#15803d">书写系统：中日韩 · 纯表情：否</text>

  <!-- SemanticHint -->
  <rect x="425" y="146" width="335" height="54" rx="5" fill="#fff" stroke="#86efac" stroke-width="0.8"/>
  <text x="592" y="164" text-anchor="middle" font-size="9" font-weight="700" fill="#166534">语义提示</text>
  <text x="440" y="182" font-size="8" fill="#15803d">• 日历（"明天"+"下午3点"）</text>
  <text x="605" y="182" font-size="8" fill="#15803d">• 链接（"那份合同"）</text>
  <text x="440" y="196" font-size="8" fill="#15803d">• 文件（合同文件提及）</text>

  <!-- Bottom: Complete classification -->
  <rect x="25" y="226" width="750" height="112" rx="7" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.8"/>
  <text x="400" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">语义提示完整分类（共 8 种，本地关键词匹配，不上传原始文本）</text>

  <!-- Row 1 of hints -->
  <rect x="38" y="260" width="88" height="26" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="0.5"/>
  <text x="82" y="278" text-anchor="middle" font-size="9" fill="#166534">文件</text>
  <rect x="132" y="260" width="88" height="26" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="0.5"/>
  <text x="176" y="278" text-anchor="middle" font-size="9" fill="#166534">图片</text>
  <rect x="226" y="260" width="88" height="26" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="0.5"/>
  <text x="270" y="278" text-anchor="middle" font-size="9" fill="#166534">语音消息</text>
  <rect x="320" y="260" width="88" height="26" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="0.5"/>
  <text x="364" y="278" text-anchor="middle" font-size="9" fill="#166534">链接</text>
  <rect x="414" y="260" width="88" height="26" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="0.5"/>
  <text x="458" y="278" text-anchor="middle" font-size="9" fill="#166534">日历</text>
  <rect x="508" y="260" width="88" height="26" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="0.5"/>
  <text x="552" y="278" text-anchor="middle" font-size="9" fill="#166534">用户提及</text>
  <rect x="602" y="260" width="88" height="26" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="646" y="278" text-anchor="middle" font-size="9" fill="#dc2626">验证码</text>
  <rect x="696" y="260" width="66" height="26" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="0.5"/>
  <text x="729" y="278" text-anchor="middle" font-size="9" fill="#166534">金融</text>

  <!-- TextHint row -->
  <text x="400" y="308" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">文本提示维度（原始数值，不分类）</text>
  <rect x="55" y="316" width="155" height="16" rx="3" fill="#e0f2fe"/>
  <text x="132" y="328" text-anchor="middle" font-size="8" fill="#075985">字符长度（usize 精确值）</text>
  <rect x="218" y="316" width="220" height="16" rx="3" fill="#e0f2fe"/>
  <text x="328" y="328" text-anchor="middle" font-size="8" fill="#075985">书写系统（Latin/CJK/Cyrillic/Arabic/Mixed）</text>
  <rect x="446" y="316" width="120" height="16" rx="3" fill="#e0f2fe"/>
  <text x="506" y="328" text-anchor="middle" font-size="8" fill="#075985">是否纯 Emoji（bool）</text>
</svg>
