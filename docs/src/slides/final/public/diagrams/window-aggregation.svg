  <text x="397.0" y="183" text-anchor="middle" font-size="11" fill="#0e7490">文件访问 / 应用切换 / 通知</text>
  <rect x="512" y="138" width="190" height="54" rx="10" fill="#cffafe" stroke="#67e8f9" class="box" />
