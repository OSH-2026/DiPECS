  <text x="302" y="118" text-anchor="middle" font-size="11" fill="#64748b">t0+10s</text>
  <text x="512" y="118" text-anchor="middle" font-size="11" fill="#64748b">t0+20s</text>
  <text x="722" y="118" text-anchor="middle" font-size="11" fill="#64748b">t0+30s</text>
  <rect x="92" y="138" width="190" height="54" rx="10" fill="#cffafe" stroke="#67e8f9" class="box" />
  <text x="187.0" y="162" text-anchor="middle" font-size="12" fill="#0e7490" font-weight="800">窗口 1</text>
  <text x="187.0" y="183" text-anchor="middle" font-size="11" fill="#0e7490">应用切换 / 通知 / 系统状态</text>
  <rect x="302" y="138" width="190" height="54" rx="10" fill="#cffafe" stroke="#67e8f9" class="box" />
