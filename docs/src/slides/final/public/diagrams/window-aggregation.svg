  <text x="607.0" y="183" text-anchor="middle" font-size="11" fill="#0e7490">进程状态 / 屏幕状态 / 系统</text>
  <line x1="512" y1="206" x2="512" y2="240" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="210" y="240" width="604" height="62" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box" />
  <text x="512.0" y="264" text-anchor="middle" font-size="13" fill="#1e40af" font-weight="800">WindowAggregator.close()</text>
