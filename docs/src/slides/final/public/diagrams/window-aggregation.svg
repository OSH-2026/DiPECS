  <path d="M432,484 L432,508 L370,508" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <path d="M528,484 L528,508 L590,508" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <rect x="278" y="496" width="184" height="32" rx="10" fill="#fef3c7" stroke="#fbbf24" class="box" />
  <text x="370.0" y="520" text-anchor="middle" font-size="12" fill="#92400e" font-weight="800">决策后端</text>
