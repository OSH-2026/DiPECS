  <text x="592.0" y="520" text-anchor="middle" font-size="12" fill="#166534" font-weight="800">意图批次</text>
  <line x1="462" y1="512" x2="500" y2="512" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
