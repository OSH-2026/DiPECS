  <line x1="512" y1="402" x2="512" y2="430" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="252" y="430" width="456" height="54" rx="10" fill="#fef3c7" stroke="#fbbf24" class="box" />
  <text x="480.0" y="454" text-anchor="middle" font-size="13" fill="#92400e" font-weight="800">模型输入</text>
