<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 460" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowg" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrowf" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#d97706"/>
    </marker>
  </defs>

  <rect width="1020" height="460" rx="10" fill="#f8fafc" stroke="#bae6fd" stroke-width="1"/>

  <text x="510" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#0369a1">运行时管线</text>

  <!-- ===== LEFT PANEL: 采集任务 ===== -->
  <rect x="15" y="50" width="450" height="392" rx="8" fill="#f0f9ff" stroke="#bae6fd" stroke-width="0.8"/>
  <rect x="15" y="50" width="450" height="24" rx="8" fill="#e0f2fe"/>
  <rect x="15" y="62" width="450" height="12" fill="#e0f2fe"/>
  <text x="240" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#075985">采集任务</text>

  <!-- Row 1: 采集器 -->
  <rect x="36" y="90" width="105" height="44" rx="5" fill="#fff" stroke="#93c5fd" stroke-width="0.6"/>
  <text x="88" y="110" text-anchor="middle" font-size="9" font-weight="600" fill="#075985">Android JSONL</text>
  <text x="88" y="125" text-anchor="middle" font-size="7" fill="#0e7490">轮询 actions.jsonl</text>

  <rect x="154" y="90" width="98" height="44" rx="5" fill="#fff" stroke="#93c5fd" stroke-width="0.6"/>
  <text x="203" y="110" text-anchor="middle" font-size="9" font-weight="600" fill="#075985">进程读取器</text>
  <text x="203" y="125" text-anchor="middle" font-size="7" fill="#0e7490">/proc 扫描差异</text>

  <rect x="265" y="90" width="98" height="44" rx="5" fill="#fff" stroke="#93c5fd" stroke-width="0.6"/>
  <text x="314" y="110" text-anchor="middle" font-size="9" font-weight="600" fill="#075985">系统状态采集</text>
  <text x="314" y="125" text-anchor="middle" font-size="7" fill="#0e7490">电量·网络·屏幕</text>

  <rect x="378" y="90" width="72" height="38" rx="5" fill="#fefce8" stroke="#fde047" stroke-width="0.6" stroke-dasharray="3,2"/>
  <text x="414" y="110" text-anchor="middle" font-size="8" font-weight="600" fill="#a16207">Binder探针</text>
  <text x="414" y="123" text-anchor="middle" font-size="6.5" fill="#a16207">桩</text>

  <!-- Drops from 3 main collectors → RustIngress -->
  <line x1="88" y1="134" x2="88" y2="156" stroke="#2563eb" stroke-width="1.1" marker-end="url(#arrow)"/>
  <line x1="203" y1="134" x2="203" y2="156" stroke="#2563eb" stroke-width="1.1" marker-end="url(#arrow)"/>
  <line x1="314" y1="134" x2="314" y2="156" stroke="#2563eb" stroke-width="1.1" marker-end="url(#arrow)"/>
  <!-- Binder stub → right edge of RustIngress -->
  <path d="M414,128 L414,152 L330,152 L330,156" fill="none" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Rust 采集入口 -->
  <rect x="80" y="160" width="280" height="48" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="220" y="181" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">Rust 采集入口</text>
  <text x="220" y="197" text-anchor="middle" font-size="7.5" fill="#1d4ed8">模式校验 · 来源层级标记</text>

  <line x1="220" y1="208" x2="220" y2="234" stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 已摄入原始事件 -->
  <rect x="125" y="238" width="190" height="36" rx="5" fill="#fefce8" stroke="#fde047" stroke-width="0.8"/>
  <text x="220" y="260" text-anchor="middle" font-size="9.5" font-weight="600" fill="#854d0e">已摄入原始事件</text>

  <!-- ===== CHANNEL (raw_events mpsc) ===== -->
  <path d="M315,256 L635,256" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrowg)"/>

  <rect x="443" y="230" width="64" height="22" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="0.5"/>
  <text x="475" y="244" text-anchor="middle" font-size="7.5" font-weight="600" fill="#059669">raw_events</text>
  <text x="475" y="249" text-anchor="middle" font-size="7" fill="#166534">1024 buf</text>

  <!-- ===== RIGHT PANEL: 处理任务 ===== -->
  <rect x="535" y="50" width="470" height="392" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.8"/>
  <rect x="535" y="50" width="470" height="24" rx="8" fill="#e2e8f0"/>
  <rect x="535" y="62" width="470" height="12" fill="#e2e8f0"/>
  <text x="770" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">处理任务</text>

  <!-- 隐私气隙 -->
  <rect x="635" y="90" width="240" height="48" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.8"/>
  <text x="755" y="112" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">隐私气隙</text>
  <text x="755" y="128" text-anchor="middle" font-size="7.5" fill="#b91c1c">原始事件 → 已脱敏事件</text>

  <line x1="755" y1="138" x2="755" y2="156" stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 窗口聚合器 -->
  <rect x="635" y="160" width="240" height="48" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="0.8"/>
  <text x="755" y="182" text-anchor="middle" font-size="10" font-weight="700" fill="#075985">窗口聚合器</text>
  <text x="755" y="198" text-anchor="middle" font-size="7.5" fill="#0e7490">10s 窗口缓冲 → 结构化上下文</text>

  <line x1="755" y1="208" x2="755" y2="228" stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- process_window() 核心处理 -->
  <rect x="595" y="232" width="320" height="78" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="755" y="254" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">process_window()</text>
  <text x="755" y="270" text-anchor="middle" font-size="7.5" fill="#1d4ed8">轮询画像摘要 → 路由器评估 → 生命周期运行</text>
  <text x="755" y="284" text-anchor="middle" font-size="7.5" fill="#1d4ed8">→ 记忆存储观测 → 持久化 → 追踪记录</text>
  <text x="755" y="298" text-anchor="middle" font-size="7.5" fill="#1d4ed8">window_ordinal 由驱动循环显式传入</text>

  <!-- 两个输出框 — 垂直下落到输出行 -->
  <line x1="675" y1="310" x2="675" y2="334" stroke="#2563eb" stroke-width="1.1" marker-end="url(#arrow)"/>
  <line x1="845" y1="310" x2="845" y2="334" stroke="#2563eb" stroke-width="1.1" marker-end="url(#arrow)"/>

  <rect x="585" y="338" width="180" height="38" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="0.7"/>
  <text x="675" y="362" text-anchor="middle" font-size="9.5" font-weight="600" fill="#166534">审计记录列表</text>

  <rect x="775" y="338" width="180" height="38" rx="5" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="0.7"/>
  <text x="865" y="362" text-anchor="middle" font-size="9.5" font-weight="600" fill="#5b21b6">运行时追踪记录</text>

  <!-- ModelMemoryStore — 从 process_window 中心垂直线到达 -->
  <line x1="755" y1="310" x2="755" y2="388" stroke="#2563eb" stroke-width="1.1" marker-end="url(#arrow)"/>

  <rect x="640" y="392" width="230" height="34" rx="5" fill="#fefce8" stroke="#fde047" stroke-width="0.7"/>
  <text x="755" y="413" text-anchor="middle" font-size="9.5" font-weight="600" fill="#a16207">模型记忆存储</text>

  <!-- 反馈回路：通道间隙上下走，接入 process_window 左侧 -->
  <path d="M640,409 L500,409 L500,248 L595,248" fill="none" stroke="#d97706" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#arrowf)"/>
  <text x="512" y="403" text-anchor="middle" font-size="7.5" fill="#d97706">下一窗口反馈</text>

  <!-- 图例 -->
  <rect x="535" y="435" width="10" height="10" rx="2" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.3"/>
  <text x="549" y="445" font-size="7.5" fill="#64748b">信任边界</text>
  <rect x="615" y="435" width="10" height="10" rx="2" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="0.3"/>
  <text x="629" y="445" font-size="7.5" fill="#64748b">聚合/决策</text>
  <rect x="695" y="435" width="10" height="10" rx="2" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="0.3"/>
  <text x="709" y="445" font-size="7.5" fill="#64748b">记录</text>
  <rect x="755" y="435" width="10" height="10" rx="2" fill="#fefce8" stroke="#fde047" stroke-width="0.3"/>
  <text x="769" y="445" font-size="7.5" fill="#64748b">记忆/反馈</text>
</svg>
