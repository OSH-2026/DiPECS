<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-muted" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#16a34a"/>
    </marker>
    <style><![CDATA[
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 22px; font-weight: 800; fill: #0f172a; }
      .lane-title { font-size: 13px; font-weight: 800; fill: #334155; }
      .name { font-size: 12px; font-weight: 800; }
      .desc { font-size: 10.5px; }
      .tiny { font-size: 9.5px; }
      .box { stroke-width: 1.2; }
      .dashed { stroke-dasharray: 6 5; }
    ]]></style>
  </defs>

  <rect width="960" height="540" rx="16" fill="#f8fafc" stroke="#dbeafe" stroke-width="1.4"/>
  <text x="480" y="36" text-anchor="middle" class="title">Daemon 运行时管线</text>

  <!-- Task 1 -->
  <rect x="36" y="62" width="888" height="158" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="56" y="88" class="lane-title">Task 1：采集循环 poll()，所有事件先进入 RustCollectorIngress</text>

  <rect x="58" y="110" width="120" height="52" rx="10" fill="#cffafe" stroke="#67e8f9" class="box"/>
  <text x="118" y="130" text-anchor="middle" class="name" fill="#0e7490">Android JSONL</text>
  <text x="118" y="149" text-anchor="middle" class="desc" fill="#0e7490">500ms tail</text>

  <rect x="198" y="110" width="120" height="52" rx="10" fill="#cffafe" stroke="#67e8f9" class="box"/>
  <text x="258" y="130" text-anchor="middle" class="name" fill="#0e7490">ProcReader</text>
  <text x="258" y="149" text-anchor="middle" class="desc" fill="#0e7490">每 tick 差分</text>

  <rect x="338" y="110" width="120" height="52" rx="10" fill="#cffafe" stroke="#67e8f9" class="box"/>
  <text x="398" y="130" text-anchor="middle" class="name" fill="#0e7490">SystemState</text>
  <text x="398" y="149" text-anchor="middle" class="desc" fill="#0e7490">30s snapshot</text>

  <rect x="478" y="110" width="120" height="52" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box"/>
  <text x="538" y="130" text-anchor="middle" class="name" fill="#334155">BinderProbe</text>
  <text x="538" y="149" text-anchor="middle" class="desc" fill="#334155">可选特权</text>

  <rect x="258" y="174" width="184" height="42" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box"/>
  <text x="350" y="192" text-anchor="middle" class="name" fill="#1e40af">RustCollectorIngress</text>
  <text x="350" y="211" text-anchor="middle" class="desc" fill="#1e40af">schema 校验 + SourceTier</text>

  <rect x="650" y="168" width="154" height="48" rx="10" fill="#dcfce7" stroke="#86efac" class="box"/>
  <text x="727" y="188" text-anchor="middle" class="name" fill="#166534">raw_events</text>
  <text x="727" y="207" text-anchor="middle" class="desc" fill="#166534">mpsc 4096</text>

  <path d="M118,162 L118,184 L258,184" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M258,162 L258,168 L310,174" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M398,162 L398,174" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M538,162 L538,206 L442,206" fill="none" stroke="#94a3b8" stroke-width="2" class="dashed" marker-end="url(#arrow-muted)"/>
  <line x1="442" y1="195" x2="650" y2="192" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Task 2 -->
  <rect x="36" y="242" width="888" height="132" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="56" y="268" class="lane-title">Task 2：raw_rx.recv() → 脱敏 → 窗口聚合 → process_window()</text>

  <rect x="70" y="300" width="136" height="46" rx="10" fill="#ffe4e6" stroke="#fda4af" class="box"/>
  <text x="138" y="319" text-anchor="middle" class="name" fill="#9f1239">PrivacyAirGap</text>
  <text x="138" y="338" text-anchor="middle" class="desc" fill="#9f1239">Raw → Sanitized</text>

  <rect x="250" y="300" width="154" height="46" rx="10" fill="#cffafe" stroke="#67e8f9" class="box"/>
  <text x="327" y="319" text-anchor="middle" class="name" fill="#0e7490">WindowAggregator</text>
  <text x="327" y="338" text-anchor="middle" class="desc" fill="#0e7490">push / close 10s</text>

  <rect x="448" y="300" width="142" height="46" rx="10" fill="#dcfce7" stroke="#86efac" class="box"/>
  <text x="519" y="319" text-anchor="middle" class="name" fill="#166534">StructuredContext</text>
  <text x="519" y="338" text-anchor="middle" class="desc" fill="#166534">窗口摘要</text>

  <rect x="648" y="290" width="220" height="66" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box"/>
  <text x="758" y="310" text-anchor="middle" class="name" fill="#1e40af">process_window()</text>
  <text x="758" y="330" text-anchor="middle" class="desc" fill="#1e40af">Memory → Router → Lifecycle</text>
  <text x="758" y="345" text-anchor="middle" class="desc" fill="#1e40af">Audit + Trace + observe</text>

  <path d="M727,216 L727,234 L138,234 L138,300" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="206" y1="323" x2="250" y2="323" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="404" y1="323" x2="448" y2="323" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="590" y1="323" x2="648" y2="323" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Outputs -->
  <rect x="36" y="402" width="888" height="98" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="56" y="428" class="lane-title">process_window() 的产物：审计、trace、记忆反馈；停机时 flush 剩余窗口</text>

  <rect x="72" y="452" width="130" height="40" rx="10" fill="#ede9fe" stroke="#c4b5fd" class="box"/>
  <text x="137" y="469" text-anchor="middle" class="name" fill="#5b21b6">Audit Records</text>
  <text x="137" y="486" text-anchor="middle" class="desc" fill="#5b21b6">执行 / 拒绝 / 失败</text>

  <rect x="238" y="452" width="130" height="40" rx="10" fill="#ede9fe" stroke="#c4b5fd" class="box"/>
  <text x="303" y="469" text-anchor="middle" class="name" fill="#5b21b6">Runtime Trace</text>
  <text x="303" y="486" text-anchor="middle" class="desc" fill="#5b21b6">NDJSON 可回归</text>

  <rect x="404" y="452" width="130" height="40" rx="10" fill="#fef3c7" stroke="#fbbf24" class="box"/>
  <text x="469" y="469" text-anchor="middle" class="name" fill="#92400e">Memory Store</text>
  <text x="469" y="486" text-anchor="middle" class="desc" fill="#92400e">observe + persist</text>

  <rect x="570" y="452" width="130" height="40" rx="10" fill="#fef3c7" stroke="#fbbf24" class="box"/>
  <text x="635" y="469" text-anchor="middle" class="name" fill="#92400e">Profile Summary</text>
  <text x="635" y="486" text-anchor="middle" class="desc" fill="#92400e">后台压缩，可选</text>

  <rect x="736" y="452" width="146" height="40" rx="10" fill="#dcfce7" stroke="#86efac" class="box"/>
  <text x="809" y="469" text-anchor="middle" class="name" fill="#166534">Graceful Exit</text>
  <text x="809" y="486" text-anchor="middle" class="desc" fill="#166534">channel closed → flush</text>

  <path d="M704,356 L704,388 L137,388 L137,452" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <path d="M740,356 L740,396 L303,396 L303,452" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <path d="M776,356 L776,388 L469,388 L469,452" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M469,452 L469,382 L666,382 L666,356" fill="none" stroke="#16a34a" stroke-width="2" class="dashed" marker-end="url(#arrow-green)"/>
  <path d="M534,472 L552,472 L552,432 L635,432 L635,452" fill="none" stroke="#94a3b8" stroke-width="2" class="dashed" marker-end="url(#arrow-muted)"/>
  <path d="M804,192 L900,192 L900,472 L882,472" fill="none" stroke="#94a3b8" stroke-width="2" class="dashed" marker-end="url(#arrow-muted)"/>

  <text x="748" y="520" text-anchor="middle" class="tiny" fill="#64748b">shutdown: collection task drop sender → raw_rx None → close remaining window</text>
</svg>
