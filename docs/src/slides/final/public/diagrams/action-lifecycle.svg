<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-green" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-orange" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#ea580c"/>
    </marker>
  </defs>

  <rect width="960" height="340" rx="12" fill="#f8fafc" stroke="#bae6fd" stroke-width="1.5"/>

  <text x="480" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#0369a1">动作生命周期状态机（确定性坐标 → 终态审计记录）</text>

  <!-- Entry -->
  <rect x="15" y="46" width="120" height="36" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="75" y="63" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">动作坐标</text>
  <text x="75" y="76" text-anchor="middle" font-size="7.5" fill="#94a3b8">(窗口, 意图, 动作) 三元组</text>

  <line x1="135" y1="64" x2="158" y2="64" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- State 1: Proposed -->
  <rect x="163" y="42" width="100" height="44" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="213" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">已提议</text>
  <text x="213" y="78" text-anchor="middle" font-size="7.5" fill="#1d4ed8">新建审计记录</text>

  <line x1="263" y1="64" x2="288" y2="64" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Schema check diamond -->
  <polygon points="293,64 333,44 373,64 333,84" fill="#fefce8" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="333" y="62" text-anchor="middle" font-size="8.5" font-weight="700" fill="#92400e">模式</text>
  <text x="333" y="74" text-anchor="middle" font-size="8.5" font-weight="700" fill="#92400e">通过?</text>

  <!-- Schema fail → Rejected -->
  <path d="M333,84 L333,110 L213,110 L213,124" fill="none" stroke="#ea580c" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <text x="273" y="105" text-anchor="middle" font-size="7.5" fill="#ea580c">否</text>
  <rect x="153" y="128" width="120" height="30" rx="5" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="213" y="147" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c2410c">模式无效已拒绝</text>

  <!-- Schema ok → SchemaValidated -->
  <line x1="373" y1="64" x2="400" y2="64" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="386" y="58" font-size="7.5" fill="#16a34a">是</text>

  <!-- State 2 -->
  <rect x="405" y="42" width="110" height="44" rx="8" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="460" y="62" text-anchor="middle" font-size="9.5" font-weight="700" fill="#075985">模式已验证</text>
  <text x="460" y="78" text-anchor="middle" font-size="7" fill="#0e7490">目标非空 · 风险检查</text>

  <line x1="515" y1="64" x2="542" y2="64" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Policy diamond -->
  <polygon points="547,64 587,44 627,64 587,84" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="587" y="62" text-anchor="middle" font-size="8.5" font-weight="700" fill="#991b1b">策略</text>
  <text x="587" y="74" text-anchor="middle" font-size="8.5" font-weight="700" fill="#991b1b">通过?</text>

  <!-- Policy → PolicyChecked (BOTH pass and deny go here per code) -->
  <line x1="627" y1="64" x2="655" y2="64" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="641" y="58" font-size="7.5" fill="#16a34a">是/否</text>

  <!-- State 3: PolicyChecked - common to both pass and deny paths -->
  <rect x="660" y="42" width="105" height="44" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="712" y="62" text-anchor="middle" font-size="9.5" font-weight="700" fill="#16a34a">策略已检查</text>
  <text x="712" y="78" text-anchor="middle" font-size="7" fill="#15803d">seal() 授权或拒绝</text>

  <!-- Deny branch from PolicyChecked downward -->
  <line x1="712" y1="86" x2="712" y2="110" stroke="#dc2626" stroke-width="1.3"/>
  <line x1="460" y1="110" x2="712" y2="110" stroke="#dc2626" stroke-width="1.3"/>
  <line x1="460" y1="110" x2="460" y2="124" stroke="#dc2626" stroke-width="1.3" marker-end="url(#arrow-red)"/>
  <line x1="590" y1="110" x2="590" y2="124" stroke="#dc2626" stroke-width="1.3" marker-end="url(#arrow-red)"/>
  <rect x="400" y="128" width="120" height="30" rx="5" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="460" y="147" text-anchor="middle" font-size="8.5" font-weight="700" fill="#991b1b">策略已拒绝</text>
  <rect x="525" y="128" width="130" height="30" rx="5" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.8"/>
  <text x="590" y="147" text-anchor="middle" font-size="8.5" font-weight="700" fill="#991b1b">能力已拒绝</text>

  <line x1="765" y1="64" x2="792" y2="64" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- State 4 -->
  <rect x="797" y="42" width="95" height="44" rx="8" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="844" y="62" text-anchor="middle" font-size="9.5" font-weight="700" fill="#075985">已分发</text>
  <text x="844" y="78" text-anchor="middle" font-size="7" fill="#0e7490">适配器执行()</text>

  <line x1="844" y1="86" x2="844" y2="120" stroke="#16a34a" stroke-width="1.2"/>

  <!-- Result diamond -->
  <polygon points="844,125 880,148 844,171 808,148" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
  <text x="844" y="150" text-anchor="middle" font-size="8" font-weight="600" fill="#475569">结果</text>

  <!-- Succeeded -->
  <line x1="880" y1="148" x2="915" y2="148" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="895" y="133" width="52" height="30" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="921" y="152" text-anchor="middle" font-size="8.5" font-weight="700" fill="#16a34a">成功</text>

  <!-- Failed -->
  <line x1="808" y1="148" x2="773" y2="148" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="715" y="133" width="52" height="30" rx="5" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.2"/>
  <text x="741" y="152" text-anchor="middle" font-size="8.5" font-weight="700" fill="#dc2626">已失败</text>

  <!-- ===== Bottom: Denial Reasons ===== -->
  <rect x="15" y="180" width="930" height="68" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.8"/>
  <text x="480" y="200" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">拒绝原因枚举（8 种，按映射分为两类终态）</text>

  <rect x="30" y="210" width="120" height="28" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="90" y="228" text-anchor="middle" font-size="7.5" fill="#b91c1c">风险超出能力</text>
  <rect x="155" y="210" width="105" height="28" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="207" y="228" text-anchor="middle" font-size="7.5" fill="#b91c1c">风险超出配置</text>
  <rect x="265" y="210" width="105" height="28" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="317" y="228" text-anchor="middle" font-size="7.5" fill="#b91c1c">置信度过低</text>
  <rect x="375" y="210" width="115" height="28" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="432" y="228" text-anchor="middle" font-size="7.5" fill="#b91c1c">动作被阻止</text>
  <rect x="495" y="210" width="115" height="28" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="552" y="228" text-anchor="middle" font-size="7.5" fill="#b91c1c">延迟紧急度</text>
  <rect x="615" y="210" width="115" height="28" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="672" y="228" text-anchor="middle" font-size="7.5" fill="#b91c1c">动作能力被拒绝</text>
  <rect x="735" y="210" width="105" height="28" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="787" y="228" text-anchor="middle" font-size="7.5" fill="#b91c1c">目标不在上下文中</text>
  <rect x="845" y="210" width="88" height="28" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="889" y="228" text-anchor="middle" font-size="7" fill="#b91c1c">批次动作超限</text>
  <rect x="30" y="218" width="840" height="4" fill="none"/>

  <!-- ===== Bottom: Audit ===== -->
  <rect x="15" y="260" width="930" height="64" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.2"/>
  <text x="480" y="282" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">审计记录（终态输出）</text>
  <text x="480" y="300" text-anchor="middle" font-size="8.5" fill="#7c3aed">坐标 | 意图ID | 动作类型 | 效果 | 路由 | 迁移[] | 终态 | 结果 | 拒绝原因 | 来源层级</text>
  <text x="480" y="316" text-anchor="middle" font-size="8.5" fill="#7c3aed">每个动作坐标产出一条终态记录 · 包含完整状态迁移路径 · 确定性可比较</text>
</svg>
