<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#e11d48"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
    <style><![CDATA[
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 23px; font-weight: 850; fill: #0f172a; }
      .name { font-size: 13px; font-weight: 850; }
      .desc { font-size: 11px; font-weight: 620; }
      .tiny { font-size: 10px; font-weight: 620; }
      .box { stroke-width: 1.35; }
    ]]></style>
  </defs>

  <rect width="960" height="540" rx="18" fill="#f8fafc" stroke="#dbeafe" stroke-width="1.5"/>
  <text x="480" y="42" text-anchor="middle" class="title">ActionLifecycle：每个动作恰好一个终态</text>

  <!-- Main state machine -->
  <rect x="56" y="110" width="132" height="58" rx="12" fill="#f1f5f9" stroke="#cbd5e1" class="box"/>
  <text x="122" y="134" text-anchor="middle" class="name" fill="#334155">ActionCoord</text>
  <text x="122" y="154" text-anchor="middle" class="desc" fill="#334155">窗口 / 意图 / 动作</text>
  <line x1="188" y1="139" x2="226" y2="139" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="226" y="110" width="132" height="58" rx="12" fill="#dbeafe" stroke="#93c5fd" class="box"/>
  <text x="292" y="134" text-anchor="middle" class="name" fill="#1e40af">Proposed</text>
  <text x="292" y="154" text-anchor="middle" class="desc" fill="#1e40af">创建审计坐标</text>
  <line x1="358" y1="139" x2="396" y2="139" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="396" y="110" width="144" height="58" rx="12" fill="#dbeafe" stroke="#93c5fd" class="box"/>
  <text x="468" y="134" text-anchor="middle" class="name" fill="#1e40af">SchemaValidated</text>
  <text x="468" y="154" text-anchor="middle" class="desc" fill="#1e40af">目标 / 风险字段合法</text>
  <line x1="540" y1="139" x2="578" y2="139" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="578" y="110" width="144" height="58" rx="12" fill="#dcfce7" stroke="#86efac" class="box"/>
  <text x="650" y="134" text-anchor="middle" class="name" fill="#166534">PolicyChecked</text>
  <text x="650" y="154" text-anchor="middle" class="desc" fill="#166534">授权后 seal</text>
  <line x1="722" y1="139" x2="760" y2="139" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="760" y="110" width="132" height="58" rx="12" fill="#cffafe" stroke="#67e8f9" class="box"/>
  <text x="826" y="134" text-anchor="middle" class="name" fill="#0e7490">Dispatched</text>
  <text x="826" y="154" text-anchor="middle" class="desc" fill="#0e7490">adapter.execute()</text>

  <!-- Terminal states -->
  <rect x="102" y="260" width="160" height="60" rx="12" fill="#ffe4e6" stroke="#fda4af" class="box"/>
  <text x="182" y="284" text-anchor="middle" class="name" fill="#9f1239">InvalidSchema</text>
  <text x="182" y="304" text-anchor="middle" class="desc" fill="#9f1239">schema 失败终态</text>
  <path d="M468,168 L468,220 L182,220 L182,260" fill="none" stroke="#e11d48" stroke-width="2.3" marker-end="url(#arrow-red)"/>

  <rect x="342" y="260" width="160" height="60" rx="12" fill="#ffe4e6" stroke="#fda4af" class="box"/>
  <text x="422" y="284" text-anchor="middle" class="name" fill="#9f1239">DeniedByPolicy</text>
  <text x="422" y="304" text-anchor="middle" class="desc" fill="#9f1239">拒绝原因终态</text>
  <path d="M650,168 L650,220 L422,220 L422,260" fill="none" stroke="#e11d48" stroke-width="2.3" marker-end="url(#arrow-red)"/>

  <rect x="582" y="260" width="136" height="60" rx="12" fill="#dcfce7" stroke="#86efac" class="box"/>
  <text x="650" y="284" text-anchor="middle" class="name" fill="#166534">Succeeded</text>
  <text x="650" y="304" text-anchor="middle" class="desc" fill="#166534">执行成功终态</text>
  <path d="M826,168 L826,220 L650,220 L650,260" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="766" y="260" width="136" height="60" rx="12" fill="#ffe4e6" stroke="#fda4af" class="box"/>
  <text x="834" y="284" text-anchor="middle" class="name" fill="#9f1239">Failed</text>
  <text x="834" y="304" text-anchor="middle" class="desc" fill="#9f1239">连接/超时/拒绝</text>
  <path d="M826,168 L826,260" fill="none" stroke="#e11d48" stroke-width="2.3" marker-end="url(#arrow-red)"/>

  <!-- Audit convergence -->
  <rect x="86" y="384" width="788" height="72" rx="16" fill="#ffffff" stroke="#dbeafe" stroke-width="1.25"/>
  <text x="480" y="414" text-anchor="middle" class="name" fill="#5b21b6">所有终态统一写入 AuditRecord</text>
  <text x="480" y="438" text-anchor="middle" class="desc" fill="#5b21b6">坐标、状态迁移、终态、执行结果、拒绝原因、路由、来源层级；确定性可比较</text>

  <path d="M182,320 L182,360 L480,360 L480,384" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <path d="M422,320 L422,360 L480,360" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <path d="M650,320 L650,360 L480,360" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <path d="M834,320 L834,360 L480,360" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <rect x="235" y="480" width="490" height="34" rx="10" fill="#eff6ff" stroke="#bfdbfe" class="box"/>
  <text x="480" y="502" text-anchor="middle" class="desc" fill="#1e40af">只有 lifecycle 能 seal AuthorizedAction；执行层不能自行伪造授权动作</text>
</svg>
