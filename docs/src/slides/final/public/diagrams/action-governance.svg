<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 510" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#0284c7"/>
    </marker>
    <marker id="arrow-green" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#059669"/>
    </marker>
    <marker id="arrow-red" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#b91c1c"/>
    </marker>
  </defs>

  <rect width="900" height="510" rx="10" fill="#f8fafc" stroke="#bae6fd" stroke-width="1"/>

  <text x="450" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#0369a1">动作治理链路：从建议到授权执行</text>

  <!-- ====== Row 1: Top flow ====== -->
  <!-- h=50, y=40..90, center=65. lines at 57+74, ctr=(57+74)/2=65.5. padTop=17 padBot=16 -->

  <rect x="122" y="40" width="130" height="50" rx="7" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="187" y="57" text-anchor="middle" font-size="11" font-weight="700" fill="#075985">意图批次</text>
  <text x="187" y="74" text-anchor="middle" font-size="8.5" fill="#0e7490">来自决策路由器</text>

  <line x1="252" y1="65" x2="283" y2="65" stroke="#0284c7" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="287" y="40" width="130" height="50" rx="7" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="352" y="57" text-anchor="middle" font-size="11" font-weight="700" fill="#075985">建议动作</text>
  <text x="352" y="74" text-anchor="middle" font-size="8.5" fill="#0e7490">类型 · 目标 · 紧急度</text>

  <line x1="417" y1="65" x2="448" y2="65" stroke="#0284c7" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="452" y="40" width="130" height="50" rx="7" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="517" y="57" text-anchor="middle" font-size="11" font-weight="700" fill="#075985">动作提案</text>
  <text x="517" y="74" text-anchor="middle" font-size="8.5" fill="#0e7490">坐标 · 效果类别</text>

  <line x1="582" y1="65" x2="613" y2="65" stroke="#0284c7" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- h=54, y=38..92, center=65. lines at 57+74, ctr=65.5. padTop=19 padBot=18 -->
  <rect x="617" y="38" width="160" height="54" rx="7" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="697" y="57" text-anchor="middle" font-size="12" font-weight="800" fill="#dc2626">策略引擎</text>
  <text x="697" y="75" text-anchor="middle" font-size="9" fill="#991b1b">8 项检查 · 通过则授权 · 拒绝则记录</text>

  <line x1="697" y1="92" x2="697" y2="114" stroke="#0284c7" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ====== Row 2: Policy checks (8 items, code order) ====== -->
  <rect x="50" y="116" width="800" height="70" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="450" y="138" text-anchor="middle" font-size="10" font-weight="700" fill="#64748b">8 项策略检查（按顺序执行，任一失败即拒绝）</text>

  <rect x="58" y="150" width="90" height="22" rx="3" fill="#fff" stroke="#e2e8f0" stroke-width="0.4"/>
  <text x="103" y="165" text-anchor="middle" font-size="8" font-weight="600" fill="#475569">① 风险能力</text>
  <rect x="154" y="150" width="90" height="22" rx="3" fill="#fff" stroke="#e2e8f0" stroke-width="0.4"/>
  <text x="199" y="165" text-anchor="middle" font-size="8" font-weight="600" fill="#475569">② 风险配置</text>
  <rect x="250" y="150" width="90" height="22" rx="3" fill="#fff" stroke="#e2e8f0" stroke-width="0.4"/>
  <text x="295" y="165" text-anchor="middle" font-size="8" font-weight="600" fill="#475569">③ 置信度</text>
  <rect x="346" y="150" width="90" height="22" rx="3" fill="#fff" stroke="#e2e8f0" stroke-width="0.4"/>
  <text x="391" y="165" text-anchor="middle" font-size="8" font-weight="600" fill="#475569">④ 批量上限</text>
  <rect x="442" y="150" width="90" height="22" rx="3" fill="#fff" stroke="#e2e8f0" stroke-width="0.4"/>
  <text x="487" y="165" text-anchor="middle" font-size="8" font-weight="600" fill="#475569">⑤ 阻止列表</text>
  <rect x="538" y="150" width="90" height="22" rx="3" fill="#fff" stroke="#e2e8f0" stroke-width="0.4"/>
  <text x="583" y="165" text-anchor="middle" font-size="8" font-weight="600" fill="#475569">⑥ 延迟拒绝</text>
  <rect x="634" y="150" width="90" height="22" rx="3" fill="#fff" stroke="#e2e8f0" stroke-width="0.4"/>
  <text x="679" y="165" text-anchor="middle" font-size="8" font-weight="600" fill="#475569">⑦ 动作能力</text>
  <rect x="730" y="150" width="90" height="22" rx="3" fill="#fff" stroke="#e2e8f0" stroke-width="0.4"/>
  <text x="775" y="165" text-anchor="middle" font-size="8" font-weight="600" fill="#475569">⑧ 目标匹配</text>

  <!-- ====== Branch ====== -->
  <line x1="450" y1="186" x2="450" y2="206" stroke="#475569" stroke-width="1.4"/>
  <circle cx="450" cy="208" r="3.5" fill="#475569"/>
  <line x1="280" y1="208" x2="630" y2="208" stroke="#475569" stroke-width="1.4"/>
  <line x1="280" y1="208" x2="280" y2="228" stroke="#059669" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <line x1="630" y1="208" x2="630" y2="228" stroke="#b91c1c" stroke-width="1.8" marker-end="url(#arrow-red)"/>

  <!-- ====== Row 3: Two columns ====== -->
  <!-- Left: "pass" h=48 y=232..280 ctr=256. lines 251+268 ctr=259.5. padT=19 padB=12 -->
  <rect x="130" y="232" width="300" height="48" rx="7" fill="#dcfce7" stroke="#86efac" stroke-width="1.2"/>
  <text x="280" y="251" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">✓ 策略通过</text>
  <text x="280" y="268" text-anchor="middle" font-size="9" fill="#15803d">seal() → 已授权动作</text>

  <line x1="280" y1="280" x2="280" y2="300" stroke="#059669" stroke-width="1.6" marker-end="url(#arrow-green)"/>

  <!-- Left: "authorized" h=56 y=306..362 ctr=334. lines 325+345 -->
  <rect x="130" y="306" width="300" height="56" rx="7" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="280" y="325" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">已授权动作</text>
  <text x="280" y="345" text-anchor="middle" font-size="8.5" fill="#1d4ed8">字段私有 · 仅动作生命周期可构造 · 禁止反序列化</text>

  <!-- Right: "deny" h=48 y=232..280 ctr=256. Box x=460..800 (340w) -->
  <rect x="460" y="232" width="340" height="48" rx="7" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2"/>
  <text x="630" y="251" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">✗ 策略拒绝</text>
  <text x="630" y="268" text-anchor="middle" font-size="9" fill="#b91c1c">产出拒绝原因记录</text>

  <line x1="630" y1="280" x2="630" y2="300" stroke="#b91c1c" stroke-width="1.6" marker-end="url(#arrow-red)"/>

  <!-- Right: "reasons" h=72 y=306..378. 8 variants in 3 cols, evenly spaced -->
  <rect x="460" y="306" width="340" height="72" rx="7" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="630" y="322" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">拒绝原因枚举（8 种）</text>
  <text x="478" y="340" font-size="8" fill="#b91c1c">风险超出能力</text>
  <text x="478" y="356" font-size="8" fill="#b91c1c">风险超出配置</text>
  <text x="478" y="372" font-size="8" fill="#b91c1c">置信度过低</text>
  <text x="588" y="340" font-size="8" fill="#b91c1c">批次动作超限</text>
  <text x="588" y="356" font-size="8" fill="#b91c1c">动作类型被阻止</text>
  <text x="588" y="372" font-size="8" fill="#b91c1c">延迟紧急度</text>
  <text x="708" y="340" font-size="8" fill="#b91c1c">动作能力被拒绝</text>
  <text x="708" y="356" font-size="8" fill="#b91c1c">目标不在上下文中</text>

  <!-- ====== Row 4: Convergence ====== -->
  <line x1="280" y1="362" x2="280" y2="386" stroke="#059669" stroke-width="1.6" marker-end="url(#arrow-green)"/>

  <!-- h=46 y=392..438 -->
  <rect x="155" y="392" width="250" height="46" rx="7" fill="#ecfdf5" stroke="#86efac" stroke-width="1"/>
  <text x="280" y="409" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">动作适配器</text>
  <text x="280" y="426" text-anchor="middle" font-size="8" fill="#15803d">离线适配器 | 默认执行器 | Android 适配器</text>

  <!-- Right dashed path — starts from taller reasons box (ends at y=378), routes to audit -->
  <line x1="630" y1="378" x2="630" y2="400" stroke="#b91c1c" stroke-width="1.4"/>
  <line x1="630" y1="400" x2="450" y2="400" stroke="#b91c1c" stroke-width="1.4" stroke-dasharray="6,3"/>
  <line x1="450" y1="400" x2="450" y2="456" stroke="#b91c1c" stroke-width="1.4" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>

  <text x="540" y="394" text-anchor="middle" font-size="9" font-weight="600" fill="#b91c1c">拒绝也生成审计记录</text>

  <line x1="280" y1="438" x2="280" y2="458" stroke="#059669" stroke-width="1.6" marker-end="url(#arrow-green)"/>

  <!-- ====== AuditRecord ====== -->
  <rect x="210" y="462" width="480" height="46" rx="7" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.6"/>
  <text x="450" y="480" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">审计记录</text>
  <text x="450" y="497" text-anchor="middle" font-size="9" fill="#7c3aed">坐标 · 状态迁移 · 终态 · 结果 · 拒绝原因 · 路由 · 来源层级</text>
</svg>
