<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#e11d48"/>
    </marker>
    <style><![CDATA[
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 23px; font-weight: 850; fill: #0f172a; }
      .name { font-size: 13px; font-weight: 850; }
      .desc { font-size: 11px; font-weight: 620; }
      .tiny { font-size: 10px; font-weight: 620; }
      .box { stroke-width: 1.35; }
    ]]></style>
  </defs>

  <rect width="960" height="540" rx="18" fill="#f8fafc" stroke="#dbeafe" stroke-width="1.5"/>
  <text x="480" y="42" text-anchor="middle" class="title">案例裁决：允许与拒绝</text>

  <!-- Proposal chain -->
  <rect x="82" y="92" width="150" height="56" rx="12" fill="#cffafe" stroke="#67e8f9" class="box"/>
  <text x="157" y="116" text-anchor="middle" class="name" fill="#0e7490">IntentBatch</text>
  <text x="157" y="136" text-anchor="middle" class="desc" fill="#0e7490">后端候选建议</text>
  <line x1="232" y1="120" x2="280" y2="120" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="280" y="92" width="170" height="56" rx="12" fill="#dbeafe" stroke="#93c5fd" class="box"/>
  <text x="365" y="116" text-anchor="middle" class="name" fill="#1e40af">ActionProposal</text>
  <text x="365" y="136" text-anchor="middle" class="desc" fill="#1e40af">目标 / 风险 / 置信度</text>
  <line x1="450" y1="120" x2="498" y2="120" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="498" y="92" width="380" height="56" rx="12" fill="#ffe4e6" stroke="#fda4af" class="box"/>
  <text x="688" y="116" text-anchor="middle" class="name" fill="#9f1239">PolicyEngine</text>
  <text x="688" y="136" text-anchor="middle" class="desc" fill="#9f1239">8 项检查：能力、风险、置信、数量、阻止、延迟、动作、目标</text>

  <!-- Two cases -->
  <rect x="70" y="210" width="390" height="202" rx="16" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="265" y="240" text-anchor="middle" class="name" fill="#166534">允许案例：上下文支持目标</text>
  <rect x="104" y="268" width="136" height="48" rx="10" fill="#dcfce7" stroke="#86efac" class="box"/>
  <text x="172" y="288" text-anchor="middle" class="desc" fill="#166534">目标在窗口中</text>
  <text x="172" y="306" text-anchor="middle" class="tiny" fill="#166534">pkg / url / cache prefix</text>
  <line x1="240" y1="292" x2="284" y2="292" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <rect x="284" y="268" width="136" height="48" rx="10" fill="#dcfce7" stroke="#86efac" class="box"/>
  <text x="352" y="288" text-anchor="middle" class="desc" fill="#166534">全部检查通过</text>
  <text x="352" y="306" text-anchor="middle" class="tiny" fill="#166534">confidence / risk OK</text>
  <line x1="352" y1="316" x2="352" y2="342" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <rect x="194" y="342" width="142" height="48" rx="10" fill="#dcfce7" stroke="#86efac" class="box"/>
  <text x="265" y="362" text-anchor="middle" class="desc" fill="#166534">Approved</text>
  <text x="265" y="380" text-anchor="middle" class="tiny" fill="#166534">seal → AuthorizedAction</text>

  <rect x="500" y="210" width="390" height="202" rx="16" fill="#ffffff" stroke="#fecdd3" stroke-width="1.5"/>
  <text x="695" y="240" text-anchor="middle" class="name" fill="#9f1239">拒绝案例：高置信度也不能越界</text>
  <rect x="534" y="268" width="136" height="48" rx="10" fill="#ffe4e6" stroke="#fda4af" class="box"/>
  <text x="602" y="288" text-anchor="middle" class="desc" fill="#9f1239">目标不在窗口</text>
  <text x="602" y="306" text-anchor="middle" class="tiny" fill="#9f1239">context mismatch</text>
  <line x1="670" y1="292" x2="714" y2="292" stroke="#e11d48" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <rect x="714" y="268" width="136" height="48" rx="10" fill="#ffe4e6" stroke="#fda4af" class="box"/>
  <text x="782" y="288" text-anchor="middle" class="desc" fill="#9f1239">任一检查失败</text>
  <text x="782" y="306" text-anchor="middle" class="tiny" fill="#9f1239">fail closed</text>
  <line x1="782" y1="316" x2="782" y2="342" stroke="#e11d48" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <rect x="624" y="342" width="142" height="48" rx="10" fill="#ffe4e6" stroke="#fda4af" class="box"/>
  <text x="695" y="362" text-anchor="middle" class="desc" fill="#9f1239">Denied</text>
  <text x="695" y="380" text-anchor="middle" class="tiny" fill="#9f1239">DenialReason / 不执行</text>

  <!-- Audit -->
  <line x1="265" y1="390" x2="265" y2="450" stroke="#2563eb" stroke-width="2.3" marker-end="url(#arrow)"/>
  <line x1="695" y1="390" x2="695" y2="450" stroke="#2563eb" stroke-width="2.3" marker-end="url(#arrow)"/>
  <rect x="250" y="450" width="460" height="46" rx="12" fill="#ede9fe" stroke="#c4b5fd" class="box"/>
  <text x="480" y="470" text-anchor="middle" class="name" fill="#5b21b6">同一审计流</text>
  <text x="480" y="488" text-anchor="middle" class="desc" fill="#5b21b6">Approved 和 Denied 都可回放、可哈希、可比较；Policy 独立于模型</text>
</svg>
