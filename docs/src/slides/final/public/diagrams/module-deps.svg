<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-muted" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#94a3b8"/>
    </marker>
    <style><![CDATA[
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 22px; font-weight: 800; fill: #0f172a; }
      .lane-title { font-size: 13px; font-weight: 800; fill: #334155; }
      .name { font-size: 12px; font-weight: 800; }
      .desc { font-size: 10.5px; }
      .box { stroke-width: 1.2; }
    ]]></style>
  </defs>

  <rect width="960" height="540" rx="16" fill="#f8fafc" stroke="#dbeafe" stroke-width="1.4"/>
  <text x="480" y="36" text-anchor="middle" class="title">模块依赖关系</text>

  <rect x="345" y="64" width="270" height="58" rx="12" fill="#fef3c7" stroke="#fbbf24" class="box"/>
  <text x="480" y="90" text-anchor="middle" class="name" fill="#92400e">aios-spec</text>
  <text x="480" y="111" text-anchor="middle" class="desc" fill="#92400e">稳定类型 · trait · IPC 协议</text>

  <rect x="58" y="158" width="844" height="112" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="78" y="184" class="lane-title">核心库：只依赖 aios-spec</text>

  <rect x="96" y="205" width="154" height="50" rx="10" fill="#cffafe" stroke="#67e8f9" class="box"/>
  <text x="173" y="226" text-anchor="middle" class="name" fill="#0e7490">aios-collector</text>
  <text x="173" y="246" text-anchor="middle" class="desc" fill="#0e7490">采集输入</text>

  <rect x="302" y="205" width="154" height="50" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box"/>
  <text x="379" y="226" text-anchor="middle" class="name" fill="#1e40af">aios-core</text>
  <text x="379" y="246" text-anchor="middle" class="desc" fill="#1e40af">隐私 · 窗口 · 策略</text>

  <rect x="508" y="205" width="154" height="50" rx="10" fill="#dcfce7" stroke="#86efac" class="box"/>
  <text x="585" y="226" text-anchor="middle" class="name" fill="#166534">aios-agent</text>
  <text x="585" y="246" text-anchor="middle" class="desc" fill="#166534">路由 · 评估</text>

  <rect x="714" y="205" width="154" height="50" rx="10" fill="#ede9fe" stroke="#c4b5fd" class="box"/>
  <text x="791" y="226" text-anchor="middle" class="name" fill="#5b21b6">aios-action</text>
  <text x="791" y="246" text-anchor="middle" class="desc" fill="#5b21b6">执行适配器</text>

  <path d="M480,122 L173,205" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <path d="M480,122 L379,205" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <path d="M480,122 L585,205" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <path d="M480,122 L791,205" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>

  <rect x="58" y="302" width="844" height="106" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="78" y="328" class="lane-title">入口层：组合核心库</text>

  <rect x="170" y="350" width="230" height="50" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box"/>
  <text x="285" y="371" text-anchor="middle" class="name" fill="#334155">aios-daemon</text>
  <text x="285" y="391" text-anchor="middle" class="desc" fill="#334155">dipecsd · 运行时管线 · 画像摘要</text>

  <rect x="560" y="350" width="230" height="50" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box"/>
  <text x="675" y="371" text-anchor="middle" class="name" fill="#334155">aios-cli</text>
  <text x="675" y="391" text-anchor="middle" class="desc" fill="#334155">replay · send_action · audit</text>

  <path d="M285,350 L285,286 L379,286 L379,255" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <path d="M675,350 L675,286 L585,286 L585,255" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <path d="M675,350 L675,286 L791,286 L791,255" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>

  <rect x="250" y="445" width="460" height="48" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box"/>
  <text x="480" y="466" text-anchor="middle" class="name" fill="#1e40af">依赖方向</text>
  <text x="480" y="486" text-anchor="middle" class="desc" fill="#1e40af">入口层使用核心库；核心库共享 aios-spec 中的稳定协议与 trait</text>
</svg>
