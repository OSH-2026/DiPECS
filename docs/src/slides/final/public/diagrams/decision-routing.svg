<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 310" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#0284c7"/>
    </marker>
    <marker id="arrow-down" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="900" height="310" rx="10" fill="#f8fafc" stroke="#bae6fd" stroke-width="1"/>

  <text x="450" y="24" text-anchor="middle" font-size="18" font-weight="700" fill="#0369a1">决策路由</text>

  <!-- Top row: Input → Router → Output -->
  <rect x="30" y="38" width="150" height="42" rx="7" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="105" y="63" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">结构化上下文</text>

  <line x1="180" y1="59" x2="215" y2="59" stroke="#0284c7" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- DecisionRouter center -->
  <rect x="220" y="34" width="200" height="50" rx="8" fill="#312e81" stroke-width="0"/>
  <text x="320" y="56" text-anchor="middle" font-size="13" font-weight="800" fill="#e0e7ff">决策路由器</text>
  <text x="320" y="74" text-anchor="middle" font-size="8.5" fill="#a5b4fc">熔断 → 隐私 → 本地信号 → 复杂度</text>

  <line x1="420" y1="59" x2="458" y2="59" stroke="#0284c7" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="463" y="35" width="160" height="48" rx="7" fill="#fefce8" stroke="#fde047" stroke-width="1"/>
  <text x="543" y="57" text-anchor="middle" font-size="11" font-weight="700" fill="#854d0e">意图批次</text>
  <text x="543" y="75" text-anchor="middle" font-size="8.5" fill="#a16207">→ 动作生命周期</text>

  <!-- Arrow down from Router to backends -->
  <line x1="320" y1="84" x2="320" y2="102" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow-down)"/>

  <!-- 4 backends in a row with routing labels in colored badges -->
  <!-- FallbackNoOp -->
  <rect x="30" y="106" width="200" height="80" rx="7" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <rect x="50" y="103" width="60" height="16" rx="3" fill="#fee2e2" stroke="#fca5a5" stroke-width="0.4"/>
  <text x="80" y="114" text-anchor="middle" font-size="7.5" font-weight="600" fill="#b91c1c">熔断触发</text>
  <text x="130" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">兜底空操作</text>
  <text x="130" y="150" text-anchor="middle" font-size="8.5" fill="#b91c1c">连续错误 ≥ 5 时强制兜底</text>
  <rect x="50" y="158" width="160" height="20" rx="3" fill="#fee2e2"/>
  <text x="130" y="172" text-anchor="middle" font-size="8" fill="#991b1b">仅空操作 · 置信度 1.0</text>

  <!-- RuleBased -->
  <rect x="245" y="106" width="200" height="80" rx="7" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <rect x="265" y="103" width="80" height="16" rx="3" fill="#dcfce7" stroke="#86efac" stroke-width="0.4"/>
  <text x="305" y="114" text-anchor="middle" font-size="7.5" font-weight="600" fill="#166534">低复杂度/高隐私</text>
  <text x="345" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">规则引擎</text>
  <text x="345" y="150" text-anchor="middle" font-size="8.5" fill="#15803d">信号匹配 · 确定性规则</text>
  <rect x="265" y="158" width="160" height="20" rx="3" fill="#dcfce7"/>
  <text x="345" y="172" text-anchor="middle" font-size="8" fill="#166534">空操作 · 释放内存 · 保持活跃</text>

  <!-- LocalEvaluator -->
  <rect x="460" y="106" width="200" height="80" rx="7" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <rect x="480" y="103" width="70" height="16" rx="3" fill="#dcfce7" stroke="#86efac" stroke-width="0.4"/>
  <text x="515" y="114" text-anchor="middle" font-size="7.5" font-weight="600" fill="#166534">本地可处理</text>
  <text x="560" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">本地评估器</text>
  <text x="560" y="150" text-anchor="middle" font-size="8.5" fill="#15803d">加权评分 · 行为画像</text>
  <rect x="480" y="158" width="160" height="20" rx="3" fill="#dcfce7"/>
  <text x="560" y="172" text-anchor="middle" font-size="8" fill="#166534">空操作 · 预热 · 预取 · 释放 · 保活</text>

  <!-- CloudLlm -->
  <rect x="675" y="106" width="195" height="80" rx="7" fill="#fefce8" stroke="#fde047" stroke-width="1"/>
  <rect x="695" y="103" width="70" height="16" rx="3" fill="#fef9c3" stroke="#fde047" stroke-width="0.4"/>
  <text x="730" y="114" text-anchor="middle" font-size="7.5" font-weight="600" fill="#92400e">中高复杂度</text>
  <text x="772" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#854d0e">云端大模型</text>
  <text x="772" y="150" text-anchor="middle" font-size="8.5" fill="#a16207">可选启用 · 失败回退</text>
  <rect x="695" y="158" width="160" height="20" rx="3" fill="#fef9c3"/>
  <text x="775" y="172" text-anchor="middle" font-size="8" fill="#854d0e">风险中 · 全动作可用</text>

  <!-- Bottom: output merge + circuit breaker note -->
  <rect x="30" y="206" width="840" height="42" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.6"/>
  <text x="450" y="224" text-anchor="middle" font-size="9" fill="#475569">
    决策后端结果 → { 路由, 意图批次, 理由标签, 延迟微秒, 错误信息 }
  </text>
  <text x="450" y="240" text-anchor="middle" font-size="8" fill="#94a3b8">
    熔断器：连续错误 ≥ 5（60s 窗口）→ 兜底，单次成功即复位。云端不可用时自动降级，不阻塞主链路。
  </text>

  <!-- Legend -->
  <rect x="30" y="264" width="14" height="14" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="0.4"/>
  <text x="48" y="276" font-size="8" fill="#64748b">本地后端（风险低）</text>
  <rect x="170" y="264" width="14" height="14" rx="3" fill="#fefce8" stroke="#fde047" stroke-width="0.4"/>
  <text x="188" y="276" font-size="8" fill="#64748b">云端后端（风险中）</text>
  <rect x="310" y="264" width="14" height="14" rx="3" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.4"/>
  <text x="328" y="276" font-size="8" fill="#64748b">兜底（仅空操作）</text>
  <rect x="440" y="264" width="14" height="14" rx="3" fill="#dbeafe" stroke="#60a5fa" stroke-width="0.4"/>
  <text x="458" y="276" font-size="8" fill="#64748b">入口/出口</text>
</svg>
