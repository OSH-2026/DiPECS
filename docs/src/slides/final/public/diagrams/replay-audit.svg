<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
    <style><![CDATA[
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 23px; font-weight: 850; fill: #0f172a; }
      .lane { font-size: 13px; font-weight: 850; fill: #334155; }
      .name { font-size: 13px; font-weight: 850; }
      .desc { font-size: 11px; font-weight: 620; }
      .tiny { font-size: 10px; font-weight: 620; }
      .box { stroke-width: 1.35; }
    ]]></style>
  </defs>

  <rect width="960" height="540" rx="18" fill="#f8fafc" stroke="#dbeafe" stroke-width="1.5"/>
  <text x="480" y="42" text-anchor="middle" class="title">Replay / Audit：在线和离线共用核心逻辑</text>

  <!-- Online lane -->
  <rect x="64" y="82" width="832" height="128" rx="16" fill="#ffffff" stroke="#dbeafe" stroke-width="1.25"/>
  <text x="92" y="112" text-anchor="start" class="lane">在线路径：真实设备动作</text>
  <rect x="92" y="132" width="142" height="50" rx="10" fill="#ecfeff" stroke="#67e8f9" class="box"/>
  <text x="163" y="153" text-anchor="middle" class="name" fill="#0e7490">Android 事件</text>
  <text x="163" y="171" text-anchor="middle" class="desc" fill="#0e7490">公开 API 实采</text>
  <line x1="234" y1="157" x2="284" y2="157" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="284" y="132" width="142" height="50" rx="10" fill="#fef3c7" stroke="#fbbf24" class="box"/>
  <text x="355" y="153" text-anchor="middle" class="name" fill="#92400e">JSONL trace</text>
  <text x="355" y="171" text-anchor="middle" class="desc" fill="#92400e">同一份输入</text>
  <line x1="426" y1="157" x2="476" y2="157" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="476" y="132" width="182" height="50" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box"/>
  <text x="567" y="153" text-anchor="middle" class="name" fill="#1e40af">aios-core pipeline</text>
  <text x="567" y="171" text-anchor="middle" class="desc" fill="#1e40af">ingest / sanitize / policy</text>
  <line x1="658" y1="157" x2="708" y2="157" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="708" y="132" width="142" height="50" rx="10" fill="#dcfce7" stroke="#86efac" class="box"/>
  <text x="779" y="153" text-anchor="middle" class="name" fill="#166534">AndroidAdapter</text>
  <text x="779" y="171" text-anchor="middle" class="desc" fill="#166534">真实执行 / 回执</text>

  <!-- Offline lane -->
  <rect x="64" y="238" width="832" height="128" rx="16" fill="#ffffff" stroke="#dbeafe" stroke-width="1.25"/>
  <text x="92" y="268" text-anchor="start" class="lane">离线路径：确定性 replay</text>
  <rect x="92" y="288" width="142" height="50" rx="10" fill="#ede9fe" stroke="#c4b5fd" class="box"/>
  <text x="163" y="309" text-anchor="middle" class="name" fill="#5b21b6">同一 JSONL</text>
  <text x="163" y="327" text-anchor="middle" class="desc" fill="#5b21b6">golden input</text>
  <line x1="234" y1="313" x2="284" y2="313" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="284" y="288" width="142" height="50" rx="10" fill="#ede9fe" stroke="#c4b5fd" class="box"/>
  <text x="355" y="309" text-anchor="middle" class="name" fill="#5b21b6">aios-cli replay</text>
  <text x="355" y="327" text-anchor="middle" class="desc" fill="#5b21b6">确定性驱动</text>
  <line x1="426" y1="313" x2="476" y2="313" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="476" y="288" width="182" height="50" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box"/>
  <text x="567" y="309" text-anchor="middle" class="name" fill="#1e40af">同一 core pipeline</text>
  <text x="567" y="327" text-anchor="middle" class="desc" fill="#1e40af">状态迁移完全一致</text>
  <line x1="658" y1="313" x2="708" y2="313" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="708" y="288" width="142" height="50" rx="10" fill="#ede9fe" stroke="#c4b5fd" class="box"/>
  <text x="779" y="309" text-anchor="middle" class="name" fill="#5b21b6">OfflineAdapter</text>
  <text x="779" y="327" text-anchor="middle" class="desc" fill="#5b21b6">无 I/O / 可复现</text>

  <!-- Audit convergence -->
  <path d="M779,182 L779,402 L430,402" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow-gray)"/>
  <path d="M779,338 L779,402 L530,402" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow-gray)"/>
  <rect x="330" y="402" width="220" height="58" rx="12" fill="#ede9fe" stroke="#c4b5fd" class="box"/>
  <text x="440" y="426" text-anchor="middle" class="name" fill="#5b21b6">规范审计流</text>
  <text x="440" y="446" text-anchor="middle" class="desc" fill="#5b21b6">剥离易变字段；排序稳定</text>
  <line x1="550" y1="431" x2="606" y2="431" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="606" y="402" width="220" height="58" rx="12" fill="#fef3c7" stroke="#fbbf24" class="box"/>
  <text x="716" y="426" text-anchor="middle" class="name" fill="#92400e">sha256 审计哈希</text>
  <text x="716" y="446" text-anchor="middle" class="desc" fill="#92400e">锁定回归结果</text>

  <rect x="190" y="486" width="580" height="32" rx="10" fill="#eff6ff" stroke="#bfdbfe" class="box"/>
  <text x="480" y="507" text-anchor="middle" class="desc" fill="#1e40af">在线和离线只在 adapter 处不同；核心状态迁移、策略审查和审计格式保持一致</text>
</svg>
