<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-muted" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#94a3b8"/>
    </marker>
    <style><![CDATA[
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 22px; font-weight: 800; fill: #0f172a; }
      .label { font-size: 13px; font-weight: 750; }
      .small { font-size: 11px; }
      .tiny { font-size: 10px; }
      .muted { fill: #64748b; }
      .box { stroke-width: 1.2; }
      .soft { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.1; }
      .lane-title { font-size: 13px; font-weight: 800; fill: #334155; }
    ]]></style>
  </defs>

  <rect width="960" height="540" rx="16" fill="#f8fafc" stroke="#dbeafe" stroke-width="1.4"/>
  <text x="480" y="34" text-anchor="middle" class="title">回放与审计：在线和离线共用核心逻辑</text>
  <rect x="50" y="76" width="390" height="306" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="68" y="100" text-anchor="start" font-size="13" fill="#334155" font-weight="800">在线路径</text>
  <rect x="82" y="116" width="130" height="46" rx="10" fill="#cffafe" stroke="#67e8f9" class="box" />
  <text x="147.0" y="140" text-anchor="middle" font-size="12" fill="#0e7490" font-weight="800">Android 采集器</text>
  <text x="147.0" y="161" text-anchor="middle" font-size="11" fill="#0e7490">真实事件</text>
  <line x1="212" y1="139" x2="250" y2="139" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="250" y="116" width="130" height="46" rx="10" fill="#fef3c7" stroke="#fbbf24" class="box" />
  <text x="315.0" y="140" text-anchor="middle" font-size="12" fill="#92400e" font-weight="800">JSONL 文件</text>
  <text x="315.0" y="161" text-anchor="middle" font-size="11" fill="#92400e">同一份 trace</text>
  <line x1="315" y1="162" x2="315" y2="196" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="126" y="196" width="220" height="50" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box" />
  <text x="236.0" y="220" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="800">aios-core 主链路</text>
  <text x="236.0" y="241" text-anchor="middle" font-size="11" fill="#1e40af">隐私气隙 -&gt; 窗口 -&gt; 决策 -&gt; 策略</text>
  <line x1="236" y1="246" x2="236" y2="286" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="132" y="286" width="208" height="46" rx="10" fill="#dcfce7" stroke="#86efac" class="box" />
  <text x="236.0" y="310" text-anchor="middle" font-size="12" fill="#166534" font-weight="800">Android Bridge</text>
  <text x="236.0" y="331" text-anchor="middle" font-size="11" fill="#166534">HMAC + freshness</text>
  <text x="236.0" y="346" text-anchor="middle" font-size="11" fill="#166534">设备执行回执</text>
  <rect x="520" y="76" width="390" height="306" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="538" y="100" text-anchor="start" font-size="13" fill="#334155" font-weight="800">离线路径：replay</text>
  <rect x="552" y="116" width="150" height="46" rx="10" fill="#ede9fe" stroke="#c4b5fd" class="box" />
  <text x="627.0" y="140" text-anchor="middle" font-size="12" fill="#5b21b6" font-weight="800">CollectorEvent JSONL</text>
  <text x="627.0" y="161" text-anchor="middle" font-size="11" fill="#5b21b6">黄金输入</text>
  <line x1="702" y1="139" x2="740" y2="139" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="740" y="116" width="130" height="46" rx="10" fill="#ede9fe" stroke="#c4b5fd" class="box" />
  <text x="805.0" y="140" text-anchor="middle" font-size="12" fill="#5b21b6" font-weight="800">aios-cli replay</text>
  <text x="805.0" y="161" text-anchor="middle" font-size="11" fill="#5b21b6">确定性驱动</text>
  <line x1="805" y1="162" x2="805" y2="196" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="628" y="196" width="220" height="50" rx="10" fill="#ede9fe" stroke="#c4b5fd" class="box" />
  <text x="738.0" y="220" text-anchor="middle" font-size="12" fill="#5b21b6" font-weight="800">同一核心链路</text>
  <text x="738.0" y="241" text-anchor="middle" font-size="11" fill="#5b21b6">Ingest / Sanitize / Context / Decision / Policy</text>
  <line x1="738" y1="246" x2="738" y2="286" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="640" y="286" width="196" height="46" rx="10" fill="#ede9fe" stroke="#c4b5fd" class="box" />
  <text x="738.0" y="310" text-anchor="middle" font-size="12" fill="#5b21b6" font-weight="800">OfflineAdapter</text>
  <text x="738.0" y="331" text-anchor="middle" font-size="11" fill="#5b21b6">无 I/O；延迟恒为 0</text>
  <line x1="236" y1="332" x2="236" y2="420" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="738" y1="332" x2="738" y2="420" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="350" y="420" width="220" height="52" rx="10" fill="#ede9fe" stroke="#c4b5fd" class="box" />
  <text x="460.0" y="444" text-anchor="middle" font-size="13" fill="#5b21b6" font-weight="800">规范审计流</text>
  <text x="460.0" y="465" text-anchor="middle" font-size="11" fill="#5b21b6">排序键；剥离易变字段</text>
  <line x1="570" y1="446" x2="628" y2="446" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="628" y="420" width="196" height="52" rx="10" fill="#fef3c7" stroke="#fbbf24" class="box" />
  <text x="726.0" y="444" text-anchor="middle" font-size="13" fill="#92400e" font-weight="800">审计哈希</text>
  <text x="726.0" y="465" text-anchor="middle" font-size="11" fill="#92400e">sha256 锁定回归结果</text>
  <path d="M315,162 L315,398 L628,398 L628,420" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow-muted)"/>
  <text x="480" y="506" text-anchor="middle" font-size="13" fill="#334155" font-weight="800">在线与离线只在适配器处不同；核心状态迁移和审计格式保持一致</text>
</svg>
