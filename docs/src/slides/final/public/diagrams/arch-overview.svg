<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-muted" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#94a3b8"/>
    </marker>
    <style><![CDATA[
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 22px; font-weight: 800; fill: #0f172a; }
      .lane-title { font-size: 13px; font-weight: 800; fill: #334155; }
      .name { font-size: 12px; font-weight: 800; }
      .desc { font-size: 10.5px; }
      .tiny { font-size: 9.5px; }
      .box { stroke-width: 1.2; }
      .dashed { stroke-dasharray: 6 5; }
    ]]></style>
  </defs>

  <rect width="960" height="540" rx="16" fill="#f8fafc" stroke="#dbeafe" stroke-width="1.4"/>
  <text x="480" y="34" text-anchor="middle" class="title">总体架构：本地优先 AIOS 控制闭环</text>

  <!-- Lane 1: collection sources -->
  <rect x="34" y="58" width="892" height="86" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="54" y="84" class="lane-title">L0 本地信号源</text>

  <rect x="116" y="92" width="148" height="42" rx="10" fill="#cffafe" stroke="#67e8f9" class="box"/>
  <text x="190" y="109" text-anchor="middle" class="name" fill="#0e7490">Android 公开 API</text>
  <text x="190" y="127" text-anchor="middle" class="desc" fill="#0e7490">Usage / 通知 / 设备状态</text>

  <rect x="300" y="92" width="148" height="42" rx="10" fill="#fef3c7" stroke="#fbbf24" class="box"/>
  <text x="374" y="109" text-anchor="middle" class="name" fill="#92400e">CollectorEvent JSONL</text>
  <text x="374" y="127" text-anchor="middle" class="desc" fill="#92400e">actions.jsonl · append-only</text>

  <rect x="484" y="92" width="148" height="42" rx="10" fill="#cffafe" stroke="#67e8f9" class="box"/>
  <text x="558" y="109" text-anchor="middle" class="name" fill="#0e7490">Linux /proc + system</text>
  <text x="558" y="127" text-anchor="middle" class="desc" fill="#0e7490">进程 · 电量 · 网络</text>

  <rect x="668" y="92" width="148" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box"/>
  <text x="742" y="109" text-anchor="middle" class="name" fill="#334155">Binder / fanotify</text>
  <text x="742" y="127" text-anchor="middle" class="desc" fill="#334155">可选特权探针</text>

  <line x1="264" y1="113" x2="300" y2="113" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Lane 2: daemon data plane -->
  <rect x="34" y="166" width="892" height="118" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="54" y="192" class="lane-title">L1 Rust daemon 数据面</text>

  <rect x="80" y="210" width="132" height="46" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box"/>
  <text x="146" y="229" text-anchor="middle" class="name" fill="#1e40af">Collectors</text>
  <text x="146" y="248" text-anchor="middle" class="desc" fill="#1e40af">tailer / proc / binder</text>

  <rect x="254" y="210" width="132" height="46" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box"/>
  <text x="320" y="229" text-anchor="middle" class="name" fill="#1e40af">RustCollectorIngress</text>
  <text x="320" y="248" text-anchor="middle" class="desc" fill="#1e40af">schema + SourceTier</text>

  <rect x="428" y="210" width="132" height="46" rx="10" fill="#ffe4e6" stroke="#fda4af" class="box"/>
  <text x="494" y="229" text-anchor="middle" class="name" fill="#9f1239">PrivacyAirGap</text>
  <text x="494" y="248" text-anchor="middle" class="desc" fill="#9f1239">Raw → Sanitized</text>

  <rect x="602" y="210" width="132" height="46" rx="10" fill="#cffafe" stroke="#67e8f9" class="box"/>
  <text x="668" y="229" text-anchor="middle" class="name" fill="#0e7490">WindowAggregator</text>
  <text x="668" y="248" text-anchor="middle" class="desc" fill="#0e7490">10s → Context</text>

  <rect x="776" y="210" width="110" height="46" rx="10" fill="#dcfce7" stroke="#86efac" class="box"/>
  <text x="831" y="229" text-anchor="middle" class="name" fill="#166534">ModelInput</text>
  <text x="831" y="248" text-anchor="middle" class="desc" fill="#166534">摘要 + 记忆</text>

  <line x1="212" y1="233" x2="254" y2="233" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="386" y1="233" x2="428" y2="233" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="560" y1="233" x2="602" y2="233" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="734" y1="233" x2="776" y2="233" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <path d="M374,134 L374,160 L146,160 L146,210" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <path d="M558,134 L558,160 L146,160 L146,210" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <path d="M742,134 L742,160 L146,160 L146,210" fill="none" stroke="#94a3b8" stroke-width="2" class="dashed" marker-end="url(#arrow-muted)"/>

  <!-- Lane 3: decision and authorization -->
  <rect x="34" y="306" width="892" height="96" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="54" y="332" class="lane-title">L2 决策与授权控制面</text>

  <rect x="92" y="346" width="132" height="42" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box"/>
  <text x="158" y="363" text-anchor="middle" class="name" fill="#1e40af">DecisionRouter</text>
  <text x="158" y="381" text-anchor="middle" class="desc" fill="#1e40af">选择后端</text>

  <rect x="258" y="336" width="172" height="62" rx="10" fill="#f8fafc" stroke="#cbd5e1" class="box"/>
  <text x="344" y="354" text-anchor="middle" class="name" fill="#334155">Backends</text>
  <text x="344" y="373" text-anchor="middle" class="desc" fill="#334155">Rule / Local / Cloud*</text>
  <text x="344" y="389" text-anchor="middle" class="tiny" fill="#64748b">* 云端可选，非 TCB</text>

  <rect x="464" y="346" width="132" height="42" rx="10" fill="#dcfce7" stroke="#86efac" class="box"/>
  <text x="530" y="363" text-anchor="middle" class="name" fill="#166534">IntentBatch</text>
  <text x="530" y="381" text-anchor="middle" class="desc" fill="#166534">建议，不是权限</text>

  <rect x="630" y="346" width="132" height="42" rx="10" fill="#ffe4e6" stroke="#fda4af" class="box"/>
  <text x="696" y="363" text-anchor="middle" class="name" fill="#9f1239">PolicyEngine</text>
  <text x="696" y="381" text-anchor="middle" class="desc" fill="#9f1239">风险/能力/上下文</text>

  <rect x="796" y="346" width="104" height="42" rx="10" fill="#ede9fe" stroke="#c4b5fd" class="box"/>
  <text x="848" y="363" text-anchor="middle" class="name" fill="#5b21b6">Lifecycle</text>
  <text x="848" y="381" text-anchor="middle" class="desc" fill="#5b21b6">seal / deny</text>

  <path d="M831,256 L831,286 L158,286 L158,346" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <line x1="224" y1="367" x2="258" y2="367" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="430" y1="367" x2="464" y2="367" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="596" y1="367" x2="630" y2="367" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="762" y1="367" x2="796" y2="367" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Lane 4: execution and replay evidence -->
  <rect x="34" y="424" width="892" height="82" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="54" y="450" class="lane-title">L3 执行与可回放证据</text>

  <rect x="96" y="460" width="132" height="34" rx="10" fill="#dcfce7" stroke="#86efac" class="box"/>
  <text x="162" y="482" text-anchor="middle" class="name" fill="#166534">ActionAdapter</text>

  <rect x="270" y="460" width="132" height="34" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box"/>
  <text x="336" y="482" text-anchor="middle" class="name" fill="#1e40af">Android Bridge</text>

  <rect x="444" y="460" width="132" height="34" rx="10" fill="#ffe4e6" stroke="#fda4af" class="box"/>
  <text x="510" y="482" text-anchor="middle" class="name" fill="#9f1239">HMAC + freshness</text>

  <rect x="618" y="460" width="132" height="34" rx="10" fill="#ede9fe" stroke="#c4b5fd" class="box"/>
  <text x="684" y="482" text-anchor="middle" class="name" fill="#5b21b6">AuditRecord</text>

  <rect x="792" y="460" width="92" height="34" rx="10" fill="#fef3c7" stroke="#fbbf24" class="box"/>
  <text x="838" y="482" text-anchor="middle" class="name" fill="#92400e">Replay Hash</text>

  <path d="M848,388 L848,416 L162,416 L162,460" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <line x1="228" y1="477" x2="270" y2="477" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="402" y1="477" x2="444" y2="477" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="576" y1="477" x2="618" y2="477" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M684,460 L684,432 L838,432 L838,460" fill="none" stroke="#94a3b8" stroke-width="2" class="dashed" marker-end="url(#arrow-muted)"/>

  <text x="162" y="515" text-anchor="middle" class="tiny" fill="#64748b">AndroidAdapter / OfflineAdapter / Default stub</text>
  <text x="838" y="515" text-anchor="middle" class="tiny" fill="#64748b">aios-cli replay 使用同一 core + OfflineAdapter</text>
</svg>
