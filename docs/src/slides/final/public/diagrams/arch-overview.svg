<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0284c7"/>
    </marker>
    <marker id="arrow-light" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0ea5e9"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="420" rx="12" fill="#f8fafc" stroke="#bae6fd" stroke-width="1.5"/>

  <!-- Top label: Android Side -->
  <rect x="30" y="18" width="900" height="80" rx="8" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1"/>
  <text x="50" y="44" font-size="13" font-weight="700" fill="#0369a1">Android 设备侧</text>

  <!-- Android Collector box -->
  <rect x="50" y="52" width="170" height="36" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="135" y="74" text-anchor="middle" font-size="12" font-weight="600" fill="#075985">Android 采集器</text>

  <!-- actions.jsonl box -->
  <rect x="260" y="52" width="150" height="36" rx="6" fill="#fefce8" stroke="#fde047" stroke-width="1"/>
  <text x="335" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">actions.jsonl</text>

  <!-- Bridge (receives authorized actions from Rust core) -->
  <rect x="450" y="52" width="130" height="36" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="515" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#075985">Android 桥接</text>

  <!-- Token Auth -->
  <rect x="620" y="52" width="100" height="36" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="670" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">令牌认证</text>

  <!-- Arrows in Android row -->
  <line x1="220" y1="70" x2="255" y2="70" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- actions.jsonl → Rust (via tail). Android Bridge is on separate return path. -->
  <line x1="580" y1="70" x2="615" y2="70" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Divider line -->
  <line x1="40" y1="108" x2="920" y2="108" stroke="#bae6fd" stroke-width="1" stroke-dasharray="6,3"/>

  <!-- Middle label: Rust Core Side -->
  <text x="50" y="132" font-size="13" font-weight="700" fill="#0369a1">Rust 核心侧</text>

  <!-- Row 1: Collection Layer -->
  <rect x="50" y="148" width="140" height="50" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.2"/>
  <text x="120" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#075985">aios-collector</text>
  <text x="120" y="188" text-anchor="middle" font-size="9" fill="#0e7490">JSONL追踪 / proc / binder</text>

  <line x1="190" y1="173" x2="225" y2="173" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Ingress -->
  <rect x="230" y="148" width="130" height="50" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="295" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">Rust 采集入口</text>
  <text x="295" y="188" text-anchor="middle" font-size="9" fill="#1d4ed8">模式校验 + 层级标签</text>

  <line x1="360" y1="173" x2="395" y2="173" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PrivacyAirGap -->
  <rect x="400" y="148" width="130" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="465" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">隐私气隙</text>
  <text x="465" y="188" text-anchor="middle" font-size="9" fill="#b91c1c">原始 → 已脱敏</text>

  <line x1="530" y1="173" x2="565" y2="173" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Context Builder -->
  <rect x="570" y="148" width="130" height="50" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.2"/>
  <text x="635" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#075985">窗口聚合器</text>
  <text x="635" y="188" text-anchor="middle" font-size="9" fill="#0e7490">10秒窗口 → 上下文</text>

  <!-- Arrow down from Context Builder to Router -->
  <line x1="635" y1="198" x2="635" y2="228" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 2: Decision Layer -->
  <rect x="50" y="238" width="110" height="46" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="105" y="259" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">规则引擎</text>
  <text x="105" y="275" text-anchor="middle" font-size="8" fill="#15803d">信号匹配</text>

  <rect x="180" y="238" width="110" height="46" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="235" y="259" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">本地评估器</text>
  <text x="235" y="275" text-anchor="middle" font-size="8" fill="#15803d">加权评分</text>

  <rect x="310" y="238" width="110" height="46" rx="6" fill="#fefce8" stroke="#fde047" stroke-width="1.2"/>
  <text x="365" y="259" text-anchor="middle" font-size="10" font-weight="700" fill="#854d0e">云端大模型</text>
  <text x="365" y="275" text-anchor="middle" font-size="8" fill="#a16207">可选，OpenAI API</text>

  <rect x="440" y="238" width="110" height="46" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.2"/>
  <text x="495" y="259" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">兜底空操作</text>
  <text x="495" y="275" text-anchor="middle" font-size="8" fill="#b91c1c">熔断器</text>

  <!-- Router in center -->
  <rect x="575" y="238" width="125" height="46" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="637" y="259" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">决策路由器</text>
  <text x="637" y="275" text-anchor="middle" font-size="9" fill="#1d4ed8">四级路由</text>

  <!-- Arrows backends → Router -->
  <line x1="160" y1="261" x2="175" y2="261" stroke="#0284c7" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="290" y1="261" x2="305" y2="261" stroke="#0284c7" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="420" y1="261" x2="435" y2="261" stroke="#0284c7" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="550" y1="261" x2="570" y2="261" stroke="#0284c7" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Row 3: Policy + Execution -->
  <line x1="637" y1="284" x2="637" y2="308" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="440" y="316" width="110" height="46" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.2"/>
  <text x="495" y="338" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">策略引擎</text>
  <text x="495" y="354" text-anchor="middle" font-size="8" fill="#b91c1c">8 项检查</text>

  <line x1="550" y1="339" x2="575" y2="339" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="580" y="316" width="120" height="46" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="640" y="338" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">动作生命周期</text>
  <text x="640" y="354" text-anchor="middle" font-size="8" fill="#15803d">状态机</text>

  <line x1="700" y1="339" x2="730" y2="339" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="735" y="316" width="100" height="46" rx="6" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.2"/>
  <text x="785" y="338" text-anchor="middle" font-size="10" font-weight="700" fill="#075985">动作适配器</text>
  <text x="785" y="354" text-anchor="middle" font-size="8" fill="#0e7490">离线 / 桌面 / Android</text>

  <!-- Arrow back up to Android Bridge (feedback loop) -->
  <path d="M785,316 L785,100 L720,70" fill="none" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow-light)"/>

  <!-- Bottom row: Audit -->
  <rect x="50" y="376" width="140" height="32" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="120" y="396" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">aios-cli 回放</text>

  <line x1="190" y1="392" x2="225" y2="392" stroke="#0284c7" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="230" y="376" width="140" height="32" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="300" y="396" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">离线适配器</text>

  <line x1="370" y1="392" x2="405" y2="392" stroke="#0284c7" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="410" y="376" width="160" height="32" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="490" y="396" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">审计记录（外部计算哈希）</text>

  <!-- Legend -->
  <rect x="600" y="376" width="14" height="14" rx="3" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.8"/>
  <text x="618" y="388" font-size="9" fill="#64748b">信任边界</text>
  <rect x="680" y="376" width="14" height="14" rx="3" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="0.8"/>
  <text x="698" y="388" font-size="9" fill="#64748b">核心模块</text>
  <rect x="760" y="376" width="14" height="14" rx="3" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="0.8"/>
  <text x="778" y="388" font-size="9" fill="#64748b">审计/回放</text>
</svg>
