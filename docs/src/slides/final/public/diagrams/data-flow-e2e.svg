<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#0284c7"/>
    </marker>
    <marker id="arrow-red" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="900" height="420" rx="10" fill="#f8fafc" stroke="#bae6fd" stroke-width="1"/>

  <text x="450" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#0369a1">端到端数据流全貌</text>

  <!-- Layer 0: Sources -->
  <rect x="20" y="40" width="860" height="48" rx="6" fill="#f0f9ff" stroke="#bae6fd" stroke-width="0.8"/>
  <text x="35" y="60" font-size="10" font-weight="700" fill="#0369a1">L0 数据源</text>
  <rect x="110" y="47" width="110" height="22" rx="3" fill="#fff" stroke="#7dd3fc" stroke-width="0.4"/>
  <text x="165" y="62" text-anchor="middle" font-size="8.5" fill="#075985">Android 采集器</text>
  <rect x="228" y="47" width="90" height="22" rx="3" fill="#fff" stroke="#7dd3fc" stroke-width="0.4"/>
  <text x="273" y="62" text-anchor="middle" font-size="8.5" fill="#075985">进程读取器</text>
  <rect x="326" y="47" width="100" height="22" rx="3" fill="#fff" stroke="#7dd3fc" stroke-width="0.4"/>
  <text x="376" y="62" text-anchor="middle" font-size="8.5" fill="#075985">系统状态采集</text>
  <rect x="434" y="47" width="90" height="22" rx="3" fill="#fefce8" stroke="#fde047" stroke-width="0.4" stroke-dasharray="3,2"/>
  <text x="479" y="62" text-anchor="middle" font-size="8.5" fill="#a16207">Binder 探针</text>
  <rect x="532" y="47" width="90" height="22" rx="3" fill="#fefce8" stroke="#fde047" stroke-width="0.4" stroke-dasharray="3,2"/>
  <text x="577" y="62" text-anchor="middle" font-size="8.5" fill="#a16207">文件监控</text>
  <text x="640" y="62" font-size="8" fill="#94a3b8">→ 每条来源产生 原始事件，标注 公开接口 / 守护进程 来源层级</text>

  <line x1="450" y1="88" x2="450" y2="104" stroke="#0284c7" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Layer 1: Collection -->
  <rect x="20" y="108" width="860" height="40" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="0.8"/>
  <text x="35" y="128" font-size="10" font-weight="700" fill="#0369a1">L1 采集入口</text>
  <text x="130" y="128" font-size="9" fill="#0e7490">采集信封 → Rust 采集入口 → 已摄入原始事件</text>

  <line x1="450" y1="148" x2="450" y2="164" stroke="#dc2626" stroke-width="1.3" marker-end="url(#arrow-red)"/>

  <!-- Layer 2: Privacy (red highlight) -->
  <rect x="20" y="168" width="860" height="40" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="35" y="188" font-size="10" font-weight="800" fill="#dc2626">L2 隐私边界</text>
  <text x="130" y="188" font-size="9" fill="#991b1b">原始事件 — 脱敏 → 脱敏事件（丢弃原文/路径/负载，只保留 文本提示 + 语义提示）</text>

  <line x1="450" y1="208" x2="450" y2="226" stroke="#0284c7" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Layer 3: Aggregation -->
  <rect x="20" y="230" width="860" height="40" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="0.8"/>
  <text x="35" y="250" font-size="10" font-weight="700" fill="#0369a1">L3 窗口聚合</text>
  <text x="130" y="250" font-size="9" fill="#0e7490">脱敏事件 → 窗口聚合器（10s 窗口）→ 结构化上下文</text>

  <line x1="450" y1="270" x2="450" y2="288" stroke="#0284c7" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Layer 4: Decision -->
  <rect x="20" y="292" width="860" height="40" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.8"/>
  <text x="35" y="312" font-size="10" font-weight="700" fill="#0369a1">L4 决策</text>
  <text x="130" y="312" font-size="9" fill="#1d4ed8">结构化上下文 → 决策路由器（4 级路由）→ 意图批次</text>

  <line x1="450" y1="332" x2="450" y2="350" stroke="#0284c7" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Layer 5: Governance + Execution -->
  <rect x="20" y="354" width="860" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.8"/>
  <text x="35" y="374" font-size="10" font-weight="700" fill="#0369a1">L5 治理执行</text>
  <text x="130" y="374" font-size="9" fill="#991b1b">意图批次 → 策略引擎（8 项检查）→ 动作生命周期 → 动作适配器 → 审计记录</text>

  <!-- Right side: SourceTier legend (moved below to avoid overlap) -->
  <rect x="20" y="398" width="860" height="18" rx="3" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.4"/>
  <text x="30" y="411" font-size="7.5" fill="#64748b">来源层级：</text>
  <rect x="82" y="403" width="10" height="10" rx="2" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.3"/>
  <text x="95" y="412" font-size="7.5" fill="#475569">公开接口（Android 侧）</text>
  <rect x="252" y="403" width="10" height="10" rx="2" fill="#f0fdf4" stroke="#86efac" stroke-width="0.3"/>
  <text x="265" y="412" font-size="7.5" fill="#475569">守护进程（Rust 侧）</text>
  <text x="430" y="412" font-size="7.5" fill="#94a3b8">| 决策路由：规则 / 本地 / 云端 / 兜底 | 审计记录含完整迁移数组</text>
</svg>
