<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <style><![CDATA[
      text {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .title {
        font-size: 23px;
        font-weight: 850;
        fill: #0f172a;
      }
      .step {
        font-size: 14px;
        font-weight: 850;
      }
      .sub {
        font-size: 11px;
        font-weight: 600;
      }
      .tiny {
        font-size: 10px;
        font-weight: 600;
      }
      .label {
        font-size: 12px;
        font-weight: 800;
        fill: #334155;
      }
      .box {
        stroke-width: 1.3;
      }
    ]]></style>
  </defs>

  <rect width="960" height="540" rx="18" fill="#f8fafc" stroke="#dbeafe" stroke-width="1.5"/>
  <text x="480" y="42" text-anchor="middle" class="title">案例输入：本地事件如何进入系统</text>

  <!-- Main evidence chain -->
  <rect x="46" y="104" width="160" height="120" rx="14" fill="#ecfeff" stroke="#67e8f9" class="box"/>
  <text x="126" y="132" text-anchor="middle" class="step" fill="#0e7490">Android 公开 API</text>
  <rect x="66" y="152" width="120" height="24" rx="8" fill="#cffafe" stroke="#67e8f9"/>
  <text x="126" y="168" text-anchor="middle" class="tiny" fill="#0e7490">UsageStats</text>
  <rect x="66" y="182" width="120" height="24" rx="8" fill="#cffafe" stroke="#67e8f9"/>
  <text x="126" y="198" text-anchor="middle" class="tiny" fill="#0e7490">NotificationListener</text>
  <text x="126" y="216" text-anchor="middle" class="tiny" fill="#0e7490">设备状态 / 前台服务</text>

  <line x1="206" y1="164" x2="248" y2="164" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrow)"/>

  <rect x="248" y="104" width="160" height="120" rx="14" fill="#fef3c7" stroke="#fbbf24" class="box"/>
  <text x="328" y="132" text-anchor="middle" class="step" fill="#92400e">Append-only JSONL</text>
  <text x="328" y="158" text-anchor="middle" class="sub" fill="#92400e">App 私有目录</text>
  <text x="328" y="178" text-anchor="middle" class="sub" fill="#92400e">每行一个 CollectorEvent</text>
  <text x="328" y="198" text-anchor="middle" class="sub" fill="#92400e">仅 rawEvent 进入主链</text>
  <text x="328" y="216" text-anchor="middle" class="tiny" fill="#92400e">半行 / 截断由 tailer 处理</text>

  <line x1="408" y1="164" x2="450" y2="164" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrow)"/>

  <rect x="450" y="104" width="160" height="120" rx="14" fill="#dbeafe" stroke="#93c5fd" class="box"/>
  <text x="530" y="132" text-anchor="middle" class="step" fill="#1e40af">Rust 采集入口</text>
  <text x="530" y="158" text-anchor="middle" class="sub" fill="#1e40af">tail byte offset</text>
  <text x="530" y="178" text-anchor="middle" class="sub" fill="#1e40af">schema 校验</text>
  <text x="530" y="198" text-anchor="middle" class="sub" fill="#1e40af">SourceTier 标注</text>
  <text x="530" y="216" text-anchor="middle" class="tiny" fill="#1e40af">online 与 replay 共用输入格式</text>

  <line x1="610" y1="164" x2="652" y2="164" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrow)"/>

  <rect x="652" y="104" width="160" height="120" rx="14" fill="#ffe4e6" stroke="#fda4af" class="box"/>
  <text x="732" y="132" text-anchor="middle" class="step" fill="#9f1239">Privacy + Window</text>
  <text x="732" y="158" text-anchor="middle" class="sub" fill="#9f1239">RawEvent → SanitizedEvent</text>
  <text x="732" y="178" text-anchor="middle" class="sub" fill="#9f1239">原文 / 路径 / key 丢弃</text>
  <text x="732" y="198" text-anchor="middle" class="sub" fill="#9f1239">10s StructuredContext</text>
  <text x="732" y="216" text-anchor="middle" class="tiny" fill="#9f1239">模型与审计只见脱敏上下文</text>

  <!-- Evidence loop -->
  <path d="M530,224 L530,268 L250,268" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <rect x="70" y="252" width="180" height="70" rx="14" fill="#f1f5f9" stroke="#cbd5e1" class="box"/>
  <text x="160" y="280" text-anchor="middle" class="step" fill="#334155">Replay / Audit</text>
  <text x="160" y="303" text-anchor="middle" class="sub" fill="#334155">同一份 trace 离线复现</text>
  <text x="160" y="319" text-anchor="middle" class="tiny" fill="#334155">不依赖现场设备状态</text>

  <line x1="250" y1="287" x2="452" y2="287" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrow)"/>
  <rect x="452" y="252" width="180" height="70" rx="14" fill="#ede9fe" stroke="#c4b5fd" class="box"/>
  <text x="542" y="280" text-anchor="middle" class="step" fill="#5b21b6">稳定审计哈希</text>
  <text x="542" y="303" text-anchor="middle" class="sub" fill="#5b21b6">AuditRecord → sha256</text>
  <text x="542" y="319" text-anchor="middle" class="tiny" fill="#5b21b6">c99c471c…16d7</text>

  <line x1="632" y1="287" x2="690" y2="287" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrow)"/>
  <rect x="690" y="252" width="190" height="70" rx="14" fill="#dcfce7" stroke="#86efac" class="box"/>
  <text x="785" y="280" text-anchor="middle" class="step" fill="#166534">闭合性证据</text>
  <text x="785" y="303" text-anchor="middle" class="sub" fill="#166534">Android 事件 → Rust 管线</text>
  <text x="785" y="319" text-anchor="middle" class="tiny" fill="#166534">输入、脱敏、回放、审计均可复现</text>

  <!-- Bottom explanation -->
  <rect x="82" y="374" width="796" height="84" rx="16" fill="#ffffff" stroke="#dbeafe" stroke-width="1.2"/>
  <text x="480" y="404" text-anchor="middle" class="label">这页只证明“本地事件进入系统”</text>
  <text x="480" y="430" text-anchor="middle" class="sub" fill="#475569">后续的策略裁决、授权动作和设备执行分别在下一页和设备执行证据页展开</text>
  <text x="480" y="450" text-anchor="middle" class="tiny" fill="#64748b">smoke E2E 的价值：公开 API 实采事件能够进入 JSONL，被 Rust replay/audit 读取，并生成稳定审计 hash</text>
</svg>
