  <text x="404.0" y="159" text-anchor="middle" font-size="11" fill="#1e40af">offset 持久化</text>
  <text x="404.0" y="174" text-anchor="middle" font-size="11" fill="#1e40af">截断 / 轮转 / 半行</text>
  <line x1="482" y1="143" x2="514" y2="143" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
