<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-muted" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#94a3b8"/>
    </marker>
    <style><![CDATA[
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 22px; font-weight: 800; fill: #0f172a; }
      .label { font-size: 13px; font-weight: 750; }
      .small { font-size: 11px; }
      .tiny { font-size: 10px; }
      .muted { fill: #64748b; }
      .box { stroke-width: 1.2; }
      .soft { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.1; }
      .lane-title { font-size: 13px; font-weight: 800; fill: #334155; }
    ]]></style>
  </defs>

  <rect width="960" height="540" rx="16" fill="#f8fafc" stroke="#dbeafe" stroke-width="1.4"/>
  <text x="480" y="34" text-anchor="middle" class="title">Append-only JSONL 与 Rust 增量摄入</text>
  <rect x="42" y="70" width="210" height="374" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="60" y="94" text-anchor="start" font-size="13" fill="#334155" font-weight="800">Android App 进程</text>
  <rect x="70" y="116" width="154" height="52" rx="10" fill="#fef3c7" stroke="#fbbf24" class="box" />
  <text x="147.0" y="140" text-anchor="middle" font-size="12" fill="#92400e" font-weight="800">actions.jsonl</text>
  <text x="147.0" y="161" text-anchor="middle" font-size="11" fill="#92400e">仅追加</text>
  <text x="147.0" y="176" text-anchor="middle" font-size="11" fill="#92400e">app 私有目录</text>
  <line x1="147" y1="168" x2="147" y2="200" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="70" y="200" width="154" height="58" rx="10" fill="#cffafe" stroke="#67e8f9" class="box" />
  <text x="147.0" y="224" text-anchor="middle" font-size="12" fill="#0e7490" font-weight="800">Android 采集器</text>
  <text x="147.0" y="245" text-anchor="middle" font-size="11" fill="#0e7490">UsageStatsManager</text>
  <text x="147.0" y="260" text-anchor="middle" font-size="11" fill="#0e7490">NotificationListener</text>
  <rect x="70" y="292" width="154" height="98" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box" />
  <text x="147.0" y="316" text-anchor="middle" font-size="12" fill="#334155" font-weight="800">事件来源</text>
  <text x="147.0" y="337" text-anchor="middle" font-size="11" fill="#334155">前台应用变化</text>
  <text x="147.0" y="352" text-anchor="middle" font-size="11" fill="#334155">通知发布 / 交互</text>
  <text x="147.0" y="367" text-anchor="middle" font-size="11" fill="#334155">电量 / 网络 / 屏幕</text>
  <rect x="294" y="70" width="362" height="374" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="312" y="94" text-anchor="start" font-size="13" fill="#334155" font-weight="800">Rust 入口层</text>
  <rect x="326" y="114" width="156" height="58" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box" />
