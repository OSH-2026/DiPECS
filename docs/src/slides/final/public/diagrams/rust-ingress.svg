<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
    <style><![CDATA[
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 23px; font-weight: 850; fill: #0f172a; }
      .lane { font-size: 13px; font-weight: 850; fill: #334155; }
      .name { font-size: 13px; font-weight: 850; }
      .desc { font-size: 11px; font-weight: 620; }
      .tiny { font-size: 10px; font-weight: 620; }
      .box { stroke-width: 1.35; }
    ]]></style>
  </defs>

  <rect width="960" height="540" rx="18" fill="#f8fafc" stroke="#dbeafe" stroke-width="1.5"/>
  <text x="480" y="42" text-anchor="middle" class="title">Append-only JSONL 与 Rust 增量 tail</text>

  <!-- Main chain -->
  <rect x="70" y="102" width="170" height="102" rx="14" fill="#ecfeff" stroke="#67e8f9" class="box"/>
  <text x="155" y="128" text-anchor="middle" class="name" fill="#0e7490">Android 采集器</text>
  <text x="155" y="153" text-anchor="middle" class="desc" fill="#0e7490">UsageStats / 通知</text>
  <text x="155" y="173" text-anchor="middle" class="desc" fill="#0e7490">设备状态 / 屏幕</text>
  <text x="155" y="193" text-anchor="middle" class="tiny" fill="#0e7490">只使用公开 API 主链</text>

  <line x1="240" y1="153" x2="290" y2="153" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="290" y="102" width="170" height="102" rx="14" fill="#fef3c7" stroke="#fbbf24" class="box"/>
  <text x="375" y="128" text-anchor="middle" class="name" fill="#92400e">actions.jsonl</text>
  <text x="375" y="153" text-anchor="middle" class="desc" fill="#92400e">append-only</text>
  <text x="375" y="173" text-anchor="middle" class="desc" fill="#92400e">每行 CollectorEvent</text>
  <text x="375" y="193" text-anchor="middle" class="tiny" fill="#92400e">App 私有目录；仅追加</text>

  <line x1="460" y1="153" x2="510" y2="153" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="510" y="102" width="170" height="102" rx="14" fill="#dbeafe" stroke="#93c5fd" class="box"/>
  <text x="595" y="128" text-anchor="middle" class="name" fill="#1e40af">JSONL Tailer</text>
  <text x="595" y="153" text-anchor="middle" class="desc" fill="#1e40af">保存 byte offset</text>
  <text x="595" y="173" text-anchor="middle" class="desc" fill="#1e40af">半行 / 截断处理</text>
  <text x="595" y="193" text-anchor="middle" class="tiny" fill="#1e40af">重启后从 offset 续读</text>

  <line x1="680" y1="153" x2="730" y2="153" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="730" y="102" width="170" height="102" rx="14" fill="#dcfce7" stroke="#86efac" class="box"/>
  <text x="815" y="128" text-anchor="middle" class="name" fill="#166534">CollectorEnvelope</text>
  <text x="815" y="153" text-anchor="middle" class="desc" fill="#166534">schema 校验</text>
  <text x="815" y="173" text-anchor="middle" class="desc" fill="#166534">SourceTier 标注</text>
  <text x="815" y="193" text-anchor="middle" class="tiny" fill="#166534">生成 IngestedRawEvent</text>

  <line x1="815" y1="204" x2="815" y2="252" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="620" y="252" width="280" height="74" rx="14" fill="#ede9fe" stroke="#c4b5fd" class="box"/>
  <text x="760" y="280" text-anchor="middle" class="name" fill="#5b21b6">raw_events channel</text>
  <text x="760" y="304" text-anchor="middle" class="desc" fill="#5b21b6">采集任务与处理任务解耦</text>
  <text x="760" y="322" text-anchor="middle" class="tiny" fill="#5b21b6">后续进入 PrivacyAirGap 和 10s Window</text>

  <!-- Edge cases -->
  <rect x="70" y="276" width="500" height="122" rx="16" fill="#ffffff" stroke="#dbeafe" stroke-width="1.25"/>
  <text x="96" y="306" text-anchor="start" class="lane">tailer 必须处理的边界情况</text>
  <rect x="98" y="326" width="130" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box"/>
  <text x="163" y="351" text-anchor="middle" class="desc" fill="#334155">半行：等待补全</text>
  <rect x="248" y="326" width="130" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box"/>
  <text x="313" y="351" text-anchor="middle" class="desc" fill="#334155">截断：offset 归零</text>
  <rect x="398" y="326" width="130" height="42" rx="10" fill="#f1f5f9" stroke="#cbd5e1" class="box"/>
  <text x="463" y="351" text-anchor="middle" class="desc" fill="#334155">非主链：跳过</text>
  <text x="320" y="390" text-anchor="middle" class="tiny" fill="#64748b">只有包含 Rust-compatible rawEvent 的行进入主链；调查行不进入决策路径</text>

  <!-- Reuse note -->
  <rect x="180" y="430" width="600" height="54" rx="14" fill="#eff6ff" stroke="#bfdbfe" class="box"/>
  <text x="480" y="455" text-anchor="middle" class="name" fill="#1e40af">同一份 trace 可服务在线输入、离线 replay、回归测试和审计取证</text>
  <text x="480" y="475" text-anchor="middle" class="tiny" fill="#475569">这一页只讲“增量摄入”；隐私、决策与执行在后续页面展开</text>
</svg>
