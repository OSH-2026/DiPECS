  <text x="479.0" y="274" text-anchor="middle" font-size="11" fill="#1e40af">-&gt; IngestedRawEvent</text>
  <rect x="390" y="306" width="178" height="54" rx="10" fill="#ede9fe" stroke="#c4b5fd" class="box" />
  <text x="479.0" y="330" text-anchor="middle" font-size="12" fill="#5b21b6" font-weight="800">Action Bus</text>
  <text x="479.0" y="351" text-anchor="middle" font-size="11" fill="#5b21b6">合并两类来源</text>
  <text x="479.0" y="366" text-anchor="middle" font-size="11" fill="#5b21b6">统一送入核心</text>
  <line x1="479" y1="268" x2="479" y2="306" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="326" y="388" width="118" height="34" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box" />
  <text x="385.0" y="412" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="800">PublicApi</text>
  <rect x="514" y="388" width="118" height="34" rx="10" fill="#dcfce7" stroke="#86efac" class="box" />
  <text x="573.0" y="412" text-anchor="middle" font-size="11" fill="#166534" font-weight="800">Daemon</text>
  <rect x="390" y="166" width="178" height="30" rx="10" fill="#fef3c7" stroke="#fbbf24" class="box" />
  <text x="479.0" y="190" text-anchor="middle" font-size="11" fill="#92400e" font-weight="800">模式版本 + 来源层级</text>
  <rect x="514" y="246" width="110" height="42" rx="10" fill="#dcfce7" stroke="#86efac" class="box" />
  <text x="569.0" y="270" text-anchor="middle" font-size="11" fill="#166534" font-weight="800">accept_internal</text>
  <text x="569.0" y="291" text-anchor="middle" font-size="11" fill="#166534">daemon RawEvent</text>
  <line x1="569" y1="288" x2="569" y2="306" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="706" y="70" width="212" height="374" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="724" y="94" text-anchor="start" font-size="13" fill="#334155" font-weight="800">aios-core 主链路</text>
  <rect x="740" y="116" width="144" height="46" rx="10" fill="#ffe4e6" stroke="#fda4af" class="box" />
  <text x="812.0" y="140" text-anchor="middle" font-size="12" fill="#9f1239" font-weight="800">Privacy Gap</text>
  <text x="812.0" y="161" text-anchor="middle" font-size="11" fill="#9f1239">原始字段不可越界</text>
  <line x1="812" y1="162" x2="812" y2="190" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="740" y="190" width="144" height="46" rx="10" fill="#cffafe" stroke="#67e8f9" class="box" />
  <text x="812.0" y="214" text-anchor="middle" font-size="12" fill="#0e7490" font-weight="800">Window</text>
  <text x="812.0" y="235" text-anchor="middle" font-size="11" fill="#0e7490">10s 上下文</text>
  <line x1="812" y1="236" x2="812" y2="264" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="740" y="264" width="144" height="46" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box" />
  <text x="812.0" y="288" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="800">Decision</text>
  <text x="812.0" y="309" text-anchor="middle" font-size="11" fill="#1e40af">路由 + 策略</text>
  <line x1="812" y1="310" x2="812" y2="338" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="740" y="338" width="144" height="46" rx="10" fill="#ede9fe" stroke="#c4b5fd" class="box" />
  <text x="812.0" y="362" text-anchor="middle" font-size="12" fill="#5b21b6" font-weight="800">Lifecycle</text>
  <text x="812.0" y="383" text-anchor="middle" font-size="11" fill="#5b21b6">审计终态</text>
  <line x1="224" y1="142" x2="326" y2="142" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="568" y1="333" x2="740" y2="333" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="812" y="422" text-anchor="middle" font-size="11" fill="#9f1239" font-weight="700">RawEvent 在气隙前被脱敏；后续只消费 SanitizedEvent</text>
</svg>
