  <text x="569.0" y="174" text-anchor="middle" font-size="11" fill="#92400e">source tier</text>
  <line x1="569" y1="172" x2="569" y2="214" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="390" y="214" width="178" height="54" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box" />
  <text x="479.0" y="238" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="800">accept(envelope)</text>
