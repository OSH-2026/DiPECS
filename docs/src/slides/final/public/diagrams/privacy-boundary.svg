<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-muted" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#94a3b8"/>
    </marker>
    <style><![CDATA[
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 22px; font-weight: 800; fill: #0f172a; }
      .label { font-size: 13px; font-weight: 750; }
      .small { font-size: 11px; }
      .tiny { font-size: 10px; }
      .muted { fill: #64748b; }
      .box { stroke-width: 1.2; }
      .soft { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.1; }
      .lane-title { font-size: 13px; font-weight: 800; fill: #334155; }
    ]]></style>
  </defs>

  <rect width="960" height="540" rx="16" fill="#f8fafc" stroke="#dbeafe" stroke-width="1.4"/>
  <text x="480" y="34" text-anchor="middle" class="title">Privacy Air Gap：模型前的强制边界</text>
  <rect x="42" y="78" width="300" height="336" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="60" y="102" text-anchor="start" font-size="13" fill="#334155" font-weight="800">Raw Zone：不可越界</text>
  <rect x="72" y="124" width="240" height="74" rx="10" fill="#ffe4e6" stroke="#fda4af" class="box" />
  <text x="192.0" y="148" text-anchor="middle" font-size="13" fill="#9f1239" font-weight="800">RawEvent</text>
  <text x="192.0" y="169" text-anchor="middle" font-size="11" fill="#9f1239">通知标题 / 正文</text>
  <text x="192.0" y="184" text-anchor="middle" font-size="11" fill="#9f1239">文件路径 / Binder 负载</text>
  <text x="192.0" y="199" text-anchor="middle" font-size="11" fill="#9f1239">通知键 / 分组键</text>
  <rect x="72" y="224" width="110" height="46" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box" />
  <text x="127.0" y="248" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="800">PublicApi</text>
  <text x="127.0" y="269" text-anchor="middle" font-size="11" fill="#1e40af">公开采集</text>
  <rect x="202" y="224" width="110" height="46" rx="10" fill="#dcfce7" stroke="#86efac" class="box" />
  <text x="257.0" y="248" text-anchor="middle" font-size="12" fill="#166534" font-weight="800">Daemon</text>
  <text x="257.0" y="269" text-anchor="middle" font-size="11" fill="#166534">/proc / probe</text>
  <rect x="72" y="304" width="240" height="62" rx="10" fill="#ffe4e6" stroke="#fda4af" class="box" />
  <text x="192.0" y="328" text-anchor="middle" font-size="12" fill="#9f1239" font-weight="800">直接丢弃</text>
  <text x="192.0" y="349" text-anchor="middle" font-size="11" fill="#9f1239">原文、路径、负载、键值</text>
  <text x="192.0" y="364" text-anchor="middle" font-size="11" fill="#9f1239">不生成可逆映射</text>
  <rect x="388" y="92" width="78" height="306" rx="14" fill="#ffe4e6" stroke="#fda4af" class="box" />
  <text x="427" y="188" text-anchor="middle" font-size="20" fill="#9f1239" font-weight="800">隐</text>
  <text x="427" y="223" text-anchor="middle" font-size="20" fill="#9f1239" font-weight="800">私</text>
  <text x="427" y="258" text-anchor="middle" font-size="20" fill="#9f1239" font-weight="800">气</text>
  <text x="427" y="293" text-anchor="middle" font-size="20" fill="#9f1239" font-weight="800">隙</text>
  <line x1="342" y1="246" x2="388" y2="246" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="466" y1="246" x2="512" y2="246" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="512" y="78" width="406" height="336" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="530" y="102" text-anchor="start" font-size="13" fill="#334155" font-weight="800">Sanitized Zone：可进入决策</text>
  <rect x="542" y="124" width="158" height="66" rx="10" fill="#dcfce7" stroke="#86efac" class="box" />
  <text x="621.0" y="148" text-anchor="middle" font-size="12" fill="#166534" font-weight="800">SanitizedEvent</text>
  <text x="621.0" y="169" text-anchor="middle" font-size="11" fill="#166534">事件类型</text>
  <text x="621.0" y="184" text-anchor="middle" font-size="11" fill="#166534">来源层级</text>
  <text x="621.0" y="199" text-anchor="middle" font-size="11" fill="#166534">TextHint</text>
  <rect x="730" y="124" width="158" height="66" rx="10" fill="#dcfce7" stroke="#86efac" class="box" />
  <text x="809.0" y="148" text-anchor="middle" font-size="12" fill="#166534" font-weight="800">SemanticHint</text>
  <text x="809.0" y="169" text-anchor="middle" font-size="11" fill="#166534">文件 / 链接 / 日历</text>
  <text x="809.0" y="184" text-anchor="middle" font-size="11" fill="#166534">验证码 / 金融 / 提及</text>
  <line x1="621" y1="190" x2="621" y2="224" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="809" y1="190" x2="809" y2="224" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="542" y="224" width="346" height="62" rx="10" fill="#dbeafe" stroke="#93c5fd" class="box" />
  <text x="715.0" y="248" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="800">StructuredContext</text>
  <text x="715.0" y="269" text-anchor="middle" font-size="11" fill="#1e40af">前台应用、通知应用、语义提示、文件活动</text>
  <text x="715.0" y="284" text-anchor="middle" font-size="11" fill="#1e40af">系统状态、来源层级</text>
  <line x1="715" y1="286" x2="715" y2="324" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="594" y="324" width="242" height="58" rx="10" fill="#fef3c7" stroke="#fbbf24" class="box" />
  <text x="715.0" y="348" text-anchor="middle" font-size="12" fill="#92400e" font-weight="800">Decision Backend</text>
  <text x="715.0" y="369" text-anchor="middle" font-size="11" fill="#92400e">规则 / 本地 / 云端只看结构化上下文</text>
  <text x="480" y="454" text-anchor="middle" font-size="13" fill="#9f1239" font-weight="800">隐私信息在边界内不可逆丢弃；模型与审计不接触原始文本、路径和 Binder 负载</text>
</svg>
