site_name: DiPECS 核心架构指南
site_url: https://114august514.github.io/DiPECS/
site_author: DiPECS Team
site_description: DiPECS — 意图驱动的 AIOS 原型系统架构文档
copyright: DiPECS Team · <a href="https://github.com/114August514/DiPECS">Apache-2.0</a>

docs_dir: src
site_dir: site

repo_name: 114August514/DiPECS
repo_url: https://github.com/114August514/DiPECS

theme:
  name: material
  language: zh
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - scheme: default
      media: "(prefers-color-scheme: light)"
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      media: "(prefers-color-scheme: dark)"
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
  icon:
    repo: octicons/mark-github-16
  features:
    - content.code.annotate
    - content.code.copy
    - content.footnote.tooltips
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow

extra:
  social:
    - icon: octicons/mark-github-16
      link: https://github.com/114August514/DiPECS

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: zh
      separator: '[\s\-​　,，、。！？；：（）《》「」『』、‘’“”]+'
  - git-revision-date-localized:
      enabled: true
      type: datetime
      locale: zh
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: dot
          class: dot-diagram
          format: !!python/name:hooks_dot.dot_formatter
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - toc:
      permalink: true

