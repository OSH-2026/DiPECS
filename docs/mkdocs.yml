site_name: DiPECS 核心架构指南
site_url: https://114august514.github.io/DiPECS/
site_author: DiPECS Team
site_description: DiPECS — 意图驱动的 AIOS 原型系统架构文档
copyright: DiPECS Team · <a href="https://github.com/114August514/DiPECS">Apache-2.0</a>

docs_dir: src
site_dir: site

repo_name: 114August514/DiPECS
repo_url: https://github.com/114August514/DiPECS

theme:
  name: material
  language: zh
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - scheme: default
      media: "(prefers-color-scheme: light)"
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      media: "(prefers-color-scheme: dark)"
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
  icon:
    repo: octicons/mark-github-16
  features:
    - content.code.annotate
    - content.code.copy
    - content.footnote.tooltips
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow

extra:
  social:
    - icon: octicons/mark-github-16
      link: https://github.com/114August514/DiPECS

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: zh
      separator: '[\s\-​　,，、。！？；：（）《》「」『』、‘’“”]+'
  - git-revision-date-localized:
      enabled: true
      type: datetime
      locale: zh
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: dot
          class: dot-diagram
          format: !!python/name:hooks_dot.dot_formatter
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - toc:
      permalink: true

nav:
  - 项目概览: index.md
  - 架构与实现:
    - architecture/index.md
    - 设计哲学: architecture/philosophy.md
    - 代码地图: architecture/crates.md
    - 状态机: architecture/states.md
    - 数据流: architecture/data-flow.md
    - 管线与运行时: architecture/pipeline.md
    - 动作治理: architecture/action-governance.md
    - 动作执行: architecture/action-execution.md
    - 验证与审计: architecture/verification.md
  - Android:
    - 采集器: android/collector.md
    - Action Bridge: android/action-bridge.md
    - 动作能力边界: android/action-boundary.md
    - 安全与隐私边界: android/security-privacy.md
    - 真机/模拟器验证: android/real-device-validation.md
  - RFC 与发布记录:
    - RFC 流程: rfc/process.md
    - RFC-0001 分层采集与决策路由重构: rfc/0001-layered-collection-and-decision-routing.md
    - RFC-0002 Action Bus Governance: rfc/0002-action-bus-governance.md
    - 发布记录:
      - v0.2: rfc/releases/v0.2.md
      - RuleBased 能力对齐: rfc/releases/rule-based-capability-conformance.md
  - 评估与测试:
    - 模拟器评估套件: evaluation/emulator-evaluation-suite.md
  - 调研分析:
    - research/index.md
    - 交付文档:
      - 需求分析: research/deliverables/requirements.md
      - 可行性分析: research/deliverables/feasibility.md
      - 中期报告: research/deliverables/midterm.md
      - 结题报告: research/deliverables/final.md
      - Peer Review: research/deliverables/peer-review.md
    - 技术调研:
      - AIOS 参考架构: research/background/aios-arch.md
      - Android 数据源能力调研: research/background/android-data-sources.md
      - 文献综述: research/background/related-work.md
  - 学术材料: academic/index.md
  - 演示材料:
