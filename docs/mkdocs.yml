site_name: DiPECS 核心架构指南
site_url: https://114august514.github.io/DiPECS/
site_author: DiPECS Team
site_description: DiPECS — 意图驱动的 AIOS 原型系统架构文档
copyright: DiPECS Team · <a href="https://github.com/114August514/DiPECS">Apache-2.0</a>

docs_dir: src
site_dir: site

repo_name: 114August514/DiPECS
repo_url: https://github.com/114August514/DiPECS

theme:
  name: material
  language: zh
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - scheme: default
      media: "(prefers-color-scheme: light)"
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      media: "(prefers-color-scheme: dark)"
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
  icon:
    repo: octicons/mark-github-16
  features:
    - content.code.annotate
    - content.code.copy
    - content.footnote.tooltips
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow

extra:
  social:
    - icon: octicons/mark-github-16
      link: https://github.com/114August514/DiPECS

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: zh
      separator: '[\s\-​　,，、。！？；：（）《》「」『』、‘’“”]+'
  - git-revision-date-localized:
      enabled: true
      type: datetime
      locale: zh
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: dot
          class: dot-diagram
          format: !!python/name:hooks_dot.dot_formatter
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - toc:
      permalink: true

nav:
  - 项目概览: index.md
  - 当前实现:
    - current/overview.md
    - 数据流: current/data-flow.md
    - Daemon 运行时: current/runtime.md
    - 动作治理: current/action-governance.md
    - Android 桥接: current/android-bridge.md
    - Replay 与审计: current/replay-audit.md
  - 调研分析:
    - research/index.md
    - 交付文档:
      - 需求分析: research/deliverables/requirements.md
      - 可行性分析: research/deliverables/feasibility.md
      - 中期报告: research/deliverables/midterm.md
      - 结题报告: research/deliverables/final.md
      - Peer Review: research/deliverables/peer-review.md
    - 技术调研:
      - AIOS 参考架构: research/background/aios-arch.md
      - Android 数据源能力调研: research/background/android-data-sources.md
      - 文献综述: research/background/related-work.md
  - 学术材料: academic/index.md
  - 演示材料:
    - slides/index.md
    - 中期演示:
      - Slidev 源码: slides/midterm/slides.md
      - 答辩 Q&A: slides/midterm/QA.md
  - 参考资料: refs/index.md
  - 系统设计:
    - 架构概览: design/overview.md
    - 设计哲学: design/philosophy.md
    - 代码地图: design/crates-map.md
    - Daemon 架构设计: design/daemon-architecture.md
    - Android 接口最小可运行边界: design/android-interface-mvp.md
    - Android 真机验证手册: design/android-real-device-validation.md
    - Android 安全与隐私边界: design/android-security-privacy.md
    - Android 动作能力边界: design/android-action-boundary.md
    - Android 动作实现手册: design/android-action-implementation.md
    - 状态机设计: design/states.md
    - 版本发布: design/releases/v0.2.md
    - RFC 提案:
      - design/rfc/process.md
