# Android collector release pipeline — triggers on version tags
name: Android-Collector-Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android-collector

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4.2.2

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          cache-dependency-path: |
            apps/android-collector/*.gradle.kts
            apps/android-collector/app/*.gradle.kts
            apps/android-collector/gradle.properties
            apps/android-collector/gradle/wrapper/gradle-wrapper.properties

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Ensure Debug Keystore
        run: |
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v -keystore ~/.android/debug.keystore \
              -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: android-collector ${{ github.ref_name }}
          files: apps/android-collector/app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
