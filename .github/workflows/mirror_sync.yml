name: Mirror to OSH2026

on:
  push: # 监听所有推送
  delete: # 监听分支删除
  workflow_dispatch: # 支持手动触发

jobs:
  mirror_to_org:
    if: github.repository == '114August514/DiPECS'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # 获取完整的历史记录
          lfs: true
          persist-credentials: false

      - name: Mirror Push
        env:
          DEST_REPO: "github.com/OSH-2026/DiPECS.git"
          PAT: ${{ secrets.OSH2026_SYNC_TOKEN }}
        run: |
          if [ -z "$PAT" ]; then
              echo "Error: OSH2026_SYNC_TOKEN is empty! Please check your Secrets settings."
              exit 1
          fi

          # 1. 设置远程仓库地址
          REMOTE_URL="https://oauth2:${PAT}@${DEST_REPO}"

          # 2. 确保抓取所有远程信息
          git fetch --prune --unshallow 2>/dev/null || git fetch --prune

          # 3. 配置临时用户信息
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # 4. 仅当 README 尚无镜像声明时才插入 (幂等)
          if ! grep -Fq "This is a mirror of" README.md; then
            sed -i '1i > [!IMPORTANT]\n> This is a mirror of [114August514/DiPECS](https://github.com/114August514/DiPECS). Please contribute there.\n' README.md
            git add README.md
            git commit -m "chore: add mirror notice to README" || echo "No changes"
          fi

          # 5. 为所有远程分支创建本地跟踪分支（避免 detached HEAD 导致 --prune 误删）
          current="$(git rev-parse --abbrev-ref HEAD)"
          for remote in $(git branch -r | grep -v '\->' | grep '^ *origin/' | sed 's/^ *origin\///'); do
            [ "$remote" = "$current" ] && continue
            git branch --force "$remote" "origin/$remote"
          done

          # 6. 镜像推送 — 同步所有分支和标签
          git lfs install
          git push "$REMOTE_URL" "refs/heads/*:refs/heads/*" "refs/tags/*:refs/tags/*" --force --prune
