# Android collector build pipeline
name: Android-Collector-CI

on:
  workflow_dispatch:
  push:
    paths: &android_collector_paths
      - 'apps/android-collector/**'
      - '.github/workflows/android-collector.yml'
  pull_request:
    branches: [ main ]
    paths: *android_collector_paths

concurrency:
  group: android-collector-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android-collector

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4.2.2

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          cache-dependency-path: |
            apps/android-collector/*.gradle.kts
            apps/android-collector/app/*.gradle.kts
            apps/android-collector/gradle.properties
            apps/android-collector/gradle/wrapper/gradle-wrapper.properties

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-collector-debug-${{ github.sha }}
          path: apps/android-collector/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload Unit Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-collector-test-report-${{ github.sha }}
          path: apps/android-collector/app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: warn
          retention-days: 7
