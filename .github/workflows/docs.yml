name: Docs CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'crates/**'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1. 编译 mdBook 与 Rust API 文档
  build-docs:
    name: Build KB & API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0

      - name: Install Documentation Tools
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook,mdbook-graphviz,cargo-deps

      - name: Install System Dependencies (Graphviz)
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Verify Tools
        run: |
          mdbook --version
          dot -V

      - name: Generate Dependency Graph
        run: |
          mkdir -p docs/src/img
          cargo deps --all-deps | dot -Tpng > docs/src/img/deps.png || echo "Deps graph failed"

      - name: Build mdBook
        run: |
          mdbook build docs

      - name: Build API Docs
        run: cargo doc --no-deps --workspace

      - name: Upload Docs Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: |
            docs/book/
            target/doc/

  # 2. 编译学术报告 (仅在相关文件变动时触发)
  build-academic:
    name: Build Academic Reports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for Academic Changes
        id: check_changes
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "^docs/academic/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup TeX Live
        if: steps.check_changes.outputs.changed == 'true'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            docs/academic/01_Survey_Report/main.tex
            docs/academic/02_Feasibility_Report/main.tex
            docs/academic/03_Midterm_Report/main.tex
            docs/academic/04_Final_Report/main.tex
          args: -pdf -interaction=nonstopmode -shell-escape
          working_directory: docs/academic/

      - name: Prepare PDF Artifacts
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          mkdir -p academic-pdfs
          cp docs/academic/01_Survey_Report/main.pdf academic-pdfs/Survey_Report.pdf || true
          cp docs/academic/02_Feasibility_Report/main.pdf academic-pdfs/Feasibility_Report.pdf || true
          cp docs/academic/03_Midterm_Report/main.pdf academic-pdfs/Midterm_Report.pdf || true
          cp docs/academic/04_Final_Report/main.pdf academic-pdfs/Final_Report.pdf || true

      - name: Upload Academic Artifacts
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: academic-pdfs
          path: academic-pdfs/

  # 3. 整合站点结构
  deploy-site:
    name: Assemble Site
    needs: [build-docs, build-academic]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Docs Artifacts
        uses: actions/download-artifact@v4
        with:
          name: docs-html
          path: site-temp

      - name: Download Academic Artifacts (Optional)
        uses: actions/download-artifact@v4
        with:
          name: academic-pdfs
          path: academic-temp
        continue-on-error: true

      - name: Organize Structure
        run: |
          PUB="public_html"
          mkdir -p "$PUB/guide" "$PUB/api" "$PUB/academic"
          
          # 移动 mdBook
          cp -r site-temp/docs/book/* "$PUB/guide/"
          
          # 移动 API Docs
          cp -r site-temp/target/doc/* "$PUB/api/"
          
          # 动态生成学术报告链接
          PDF_HTML_SNIPPET=""
          if [ -d "academic-temp" ] && [ "$(ls -A academic-temp/*.pdf 2>/dev/null)" ]; then
            PDF_HTML_SNIPPET="<div class='mt-6 pt-6 border-t border-slate-200'><h3 class='text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center'><i class='fa-solid fa-graduation-cap mr-2'></i>学术报告 (Academic Reports)</h3><div class='grid grid-cols-1 gap-3'>"
            for pdf in academic-temp/*.pdf; do
              filename=$(basename "$pdf")
              # 转换文件名：Survey_Report.pdf -> Survey Report
              displayname=$(echo "$filename" | sed 's/\.pdf//; s/_/ /g')
              cp "$pdf" "$PUB/academic/"
              PDF_HTML_SNIPPET="${PDF_HTML_SNIPPET}<a href='./academic/${filename}' target='_blank' class='flex items-center p-3 rounded-lg border border-slate-100 hover:bg-slate-50 transition-colors text-sm text-slate-600 hover:text-indigo-600 font-medium'><i class='fa-solid fa-file-pdf text-red-500 mr-3 text-lg'></i>${displayname}</a>"
            done
            PDF_HTML_SNIPPET="${PDF_HTML_SNIPPET}</div></div>"
          fi

          # 定位 API 入口
          API_INDEX=$(find "$PUB/api" -name "index.html" | grep -v "settings.html" | head -n 1)
          API_PATH=${API_INDEX#$PUB/}
          
          # 生成引导页
          cat << EOF > "$PUB/index.html"
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>DiPECS Knowledge Base</title>
            <script src="https://cdn.tailwindcss.com"></script>
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
          </head>
          <body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8 w-full max-w-lg">
              <div class="flex items-center space-x-3 border-b border-slate-200 pb-5 mb-6">
                <i class="fa-solid fa-microchip text-3xl text-indigo-600"></i>
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">DiPECS 文档中心</h1>
              </div>
              
              <div class="space-y-4">
                <a href="./guide/" class="group flex items-center justify-between p-4 rounded-lg border border-slate-200 hover:border-indigo-500 hover:bg-indigo-50 hover:shadow-sm transition-all text-slate-700 hover:text-indigo-700 font-medium">
                  <div class="flex items-center space-x-4">
                    <i class="fa-solid fa-book text-indigo-500 text-lg w-6 text-center"></i>
                    <span>核心架构指南 (最新版)</span>
                  </div>
                  <i class="fa-solid fa-chevron-right text-slate-400 group-hover:text-indigo-500 transition-colors"></i>
                </a>
                
                <a href="./${API_PATH:-api/index.html}" class="group flex items-center justify-between p-4 rounded-lg border border-slate-200 hover:border-orange-500 hover:bg-orange-50 hover:shadow-sm transition-all text-slate-700 hover:text-orange-700 font-medium">
                  <div class="flex items-center space-x-4">
                    <i class="fa-brands fa-rust text-orange-600 text-lg w-6 text-center"></i>
                    <span>Rust API 参考手册 (最新版)</span>
                  </div>
                  <i class="fa-solid fa-chevron-right text-slate-400 group-hover:text-orange-500 transition-colors"></i>
                </a>
                ${PDF_HTML_SNIPPET}
              </div>

              <div class="mt-10 pt-6 border-t border-slate-200">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center">
                  <i class="fa-solid fa-clock-rotate-left mr-2"></i>历史版本归档 (Archive)
                </h3>
                <div class="space-y-3">
                  $( [ -d "$PUB/archive" ] && ls "$PUB/archive" | xargs -I {} echo "<a href='./archive/{}/guide/' class='flex items-center text-sm text-slate-600 hover:text-indigo-600 transition-colors'><i class='fa-solid fa-code-commit text-slate-400 mr-3 w-4 text-center'></i>版本 {} 存档</a>" || echo "<span class='text-sm text-slate-400 italic flex items-center'><i class='fa-solid fa-circle-info mr-2'></i>暂无历史归档记录。</span>" )
                </div>
              </div>
            </div>
          </body>
          </html>
          EOF
          
          # 输出结果
          mv "$PUB" deployment_payload

      - name: Upload Final Site
        uses: actions/upload-pages-artifact@v3
        with:
          path: deployment_payload/

  # 4. 自动部署到 GitHub Pages
  deploy:
    name: Deploy to Pages
    needs: deploy-site
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
