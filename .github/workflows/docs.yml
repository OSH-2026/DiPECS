name: Docs CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'crates/**'
      - 'docs/**'
      - 'data/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rustdoc-custom.css'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'docs/**'
      - 'data/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rustdoc-custom.css'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1. 编译 MkDocs 与 Rust API 文档
  build-docs:
    name: Build KB & API
    needs: build-academic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Academic PDFs
        uses: actions/download-artifact@v4
        with:
          name: academic-pdfs
          path: docs/src/academic/reports/

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-doc-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-doc-${{ runner.os }}-

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('docs/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install System Dependencies (Graphviz, lld)
        run: sudo apt-get update && sudo apt-get install -y graphviz lld

      - name: Verify Tools
        run: |
          uv --version
          dot -V

      - name: Build MkDocs
        run: |
          cd docs
          uv sync --frozen
          uv run env PYTHONPATH=. mkdocs build

      - name: Build API Docs
        run: cargo doc --no-deps --workspace --config 'target.x86_64-unknown-linux-gnu.rustdocflags = ["--extend-css", "rustdoc-custom.css"]'

      - name: Upload Docs Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: |
            docs/site/
            target/doc/

  # 2. 编译学术报告
  build-academic:
    name: Build Academic Reports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Academic Reports
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq texlive-latex-base texlive-latex-extra texlive-xetex texlive-lang-chinese latexmk fonts-noto-cjk
          cd docs/academic-src
          ../../scripts/build-academic-reports.sh

      - name: Collect PDFs
        run: |
          mkdir -p academic-pdfs
          for dir in 01_Survey_Report 02_Feasibility_Report 03_Midterm_Report 04_Final_Report; do
            pdf="docs/academic-src/${dir}/main.pdf"
            if [ ! -f "$pdf" ]; then
              echo "::error::缺少已编译 PDF: $pdf(latexmk 未产出?)"; exit 1
            fi
            cp "$pdf" "academic-pdfs/$(echo "$dir" | sed 's/^[0-9]*_//').pdf"
          done
          ls -la academic-pdfs/

      - uses: actions/upload-artifact@v4
        with:
          name: academic-pdfs
          path: academic-pdfs/
          if-no-files-found: error

  # 3. 整合站点结构
  deploy-site:
    name: Assemble Site
    needs: [build-docs, build-academic]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Docs Artifacts
        uses: actions/download-artifact@v4
        with:
          name: docs-html
          path: site-temp

      - name: Download Academic Artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: academic-pdfs
          path: academic-temp

      - name: Organize Structure
        run: |
          PUB="public_html"
          mkdir -p "$PUB/api" "$PUB/academic/reports"

          # MkDocs 输出成为站点根
          cp -r site-temp/docs/site/* "$PUB/"

          # 移动 API Docs
          cp -r site-temp/target/doc/* "$PUB/api/"

          # 构建时间戳 (后面的 API index 和首页注入都会用到)
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")

          # API Docs 缺少根索引页 (cargo doc --no-deps 不生成)，模板在 docs/api-index.html
          if [ ! -f "$PUB/api/index.html" ]; then
            crates=""
            for dir in "$PUB/api/"*/; do
              [ -f "${dir}index.html" ] || continue
              name=$(basename "$dir")
              crates="${crates}<li><a href=\"./${name}/\">${name}</a></li>"
            done
            sed -e "s|{{CRATE_LIST}}|${crates}|g" \
                -e "s|{{BUILD_TIME}}|${BUILD_TIME}|g" \
                docs/api-index.html > "$PUB/api/index.html"
          fi

          # 动态生成学术报告链接区块
          PDF_HTML_SNIPPET=""
          if [ -d "academic-temp" ] && [ "$(ls -A academic-temp/*.pdf 2>/dev/null)" ]; then
            PDF_HTML_SNIPPET="<section class=\"academic-reports\"><h3>学术报告 (Academic Reports)</h3><ul>"
            for pdf in academic-temp/*.pdf; do
              filename=$(basename "$pdf")
              displayname=$(echo "$filename" | sed 's/\.pdf//; s/_/ /g')
              cp "$pdf" "$PUB/academic/reports/"
              PDF_HTML_SNIPPET="${PDF_HTML_SNIPPET}<li><a href=\"./academic/reports/${filename}\" target=\"_blank\" rel=\"noopener\">${displayname}</a></li>"
            done
            PDF_HTML_SNIPPET="${PDF_HTML_SNIPPET}</ul></section>"
          else
            PDF_HTML_SNIPPET="<p><em>暂无学术报告。</em></p>"
          fi

          # 生成归档链接
          ARCHIVE_SNIPPET="<p><em>暂无历史归档记录。</em></p>"

          # 写入构建时间戳到站点首页
          TIMESTAMP_SNIPPET="<p class=\"build-timestamp\">构建时间: ${BUILD_TIME}</p>"

          # 注入占位符到构建好的首页
          export PDF_HTML_SNIPPET ARCHIVE_SNIPPET TIMESTAMP_SNIPPET
          python - <<'PY'
          from pathlib import Path
          import os

          index = Path("public_html/index.html")
          html = index.read_text(encoding="utf-8")
          for placeholder, snippet in {
              "<!-- ACADEMIC_REPORTS_PLACEHOLDER -->": os.environ["PDF_HTML_SNIPPET"],
              "<!-- ARCHIVE_LIST_PLACEHOLDER -->": os.environ["ARCHIVE_SNIPPET"],
              "<!-- BUILD_TIMESTAMP_PLACEHOLDER -->": os.environ["TIMESTAMP_SNIPPET"],
          }.items():
              html = html.replace(placeholder, snippet)
          index.write_text(html, encoding="utf-8")
          PY

          # 输出结果
          mv "$PUB" deployment_payload

      - name: Upload Final Site
        uses: actions/upload-pages-artifact@v3
        with:
          path: deployment_payload/

  # 4. 自动部署到 GitHub Pages
  deploy:
    name: Deploy to Pages
    needs: deploy-site
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 5. PR 预览 (仅构建，生成预览链接)
  pr-preview:
    name: PR Preview
    needs: [build-docs, build-academic]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Docs Artifacts
        uses: actions/download-artifact@v4
        with:
          name: docs-html
          path: site-temp

      - name: Assemble Preview Site
        run: |
          PUB="public_html"
          mkdir -p "$PUB/api"

          # MkDocs 输出成为站点根
          cp -r site-temp/docs/site/* "$PUB/"
          cp -r site-temp/target/doc/* "$PUB/api/"

          # 注入 PR 预览专用占位文本
          sed -i \
            -e "s|<!-- ACADEMIC_REPORTS_PLACEHOLDER -->|<p><em>学术报告仅随 main 分支发布。</em></p>|g" \
            -e "s|<!-- ARCHIVE_LIST_PLACEHOLDER -->|<p><em>PR 预览模式 — 归档仅在 main 分支可用。</em></p>|g" \
            -e "s|<!-- BUILD_TIMESTAMP_PLACEHOLDER -->|<p class=\"build-timestamp\">PR 预览构建</p>|g" \
            "$PUB/index.html"

      - name: Upload Preview Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview
          path: public_html/
          retention-days: 7
