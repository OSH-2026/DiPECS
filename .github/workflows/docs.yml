name: Docs CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'crates/**'
      - 'docs/**'
      - 'data/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'docs/**'
      - 'data/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1. 编译 mdBook 与 Rust API 文档
  build-docs:
    name: Build KB & API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0

      - name: Install Documentation Tools
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook,mdbook-graphviz,cargo-deps

      - name: Install System Dependencies (Graphviz, lld)
        run: sudo apt-get update && sudo apt-get install -y graphviz lld

      - name: Verify Tools
        run: |
          mdbook --version
          dot -V

      - name: Generate Dependency Graph
        run: |
          mkdir -p docs/src/img
          cargo deps --all-deps | dot -Tpng > docs/src/img/deps.png || echo "Deps graph failed"

      - name: Build mdBook
        run: |
          mdbook build docs

      - name: Build API Docs
        run: cargo doc --no-deps --workspace --config 'target.x86_64-unknown-linux-gnu.rustdocflags = ["--extend-css", "docs/rustdoc-custom.css"]'

      - name: Upload Docs Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: |
            docs/book/
            target/doc/

  # 2. 编译学术报告 (仅在相关文件变动时触发)
  build-academic:
    name: Build Academic Reports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for Academic Changes
        id: check_changes
        run: |
          if git diff --name-only HEAD^ HEAD 2>/dev/null | grep -q "^docs/academic/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only origin/${{ github.base_ref }}..HEAD | grep -q "^docs/academic/" && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup TeX Live
        if: steps.check_changes.outputs.changed == 'true'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            docs/academic/01_Survey_Report/main.tex
            docs/academic/02_Feasibility_Report/main.tex
            docs/academic/03_Midterm_Report/main.tex
            docs/academic/04_Final_Report/main.tex
          args: -pdf -interaction=nonstopmode -shell-escape
          working_directory: docs/academic/

      - name: Prepare PDF Artifacts
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          mkdir -p academic-pdfs
          cp docs/academic/01_Survey_Report/main.pdf academic-pdfs/Survey_Report.pdf || true
          cp docs/academic/02_Feasibility_Report/main.pdf academic-pdfs/Feasibility_Report.pdf || true
          cp docs/academic/03_Midterm_Report/main.pdf academic-pdfs/Midterm_Report.pdf || true
          cp docs/academic/04_Final_Report/main.pdf academic-pdfs/Final_Report.pdf || true

      - name: Upload Academic Artifacts
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: academic-pdfs
          path: academic-pdfs/

  # 3. 整合站点结构
  deploy-site:
    name: Assemble Site
    needs: [build-docs, build-academic]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Docs Artifacts
        uses: actions/download-artifact@v4
        with:
          name: docs-html
          path: site-temp

      - name: Download Academic Artifacts (Optional)
        uses: actions/download-artifact@v4
        with:
          name: academic-pdfs
          path: academic-temp
        continue-on-error: true

      - name: Organize Structure
        run: |
          PUB="public_html"
          mkdir -p "$PUB/guide" "$PUB/api" "$PUB/academic"

          # 移动 mdBook
          cp -r site-temp/docs/book/* "$PUB/guide/"

          # 移动 API Docs
          cp -r site-temp/target/doc/* "$PUB/api/"

          # 移动参考文献 PDF
          cp docs/refs/*.pdf "$PUB/academic/" 2>/dev/null || true

          # 动态生成学术报告链接区块
          PDF_HTML_SNIPPET=""
          if [ -d "academic-temp" ] && [ "$(ls -A academic-temp/*.pdf 2>/dev/null)" ]; then
            PDF_HTML_SNIPPET="<div class='mt-6 pt-6 border-t border-slate-200 dark:border-slate-700'><h3 class='text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center'><i class='fa-solid fa-graduation-cap mr-2'></i>学术报告 (Academic Reports)</h3><div class='grid grid-cols-1 gap-3'>"
            for pdf in academic-temp/*.pdf; do
              filename=$(basename "$pdf")
              displayname=$(echo "$filename" | sed 's/\.pdf//; s/_/ /g')
              cp "$pdf" "$PUB/academic/"
              PDF_HTML_SNIPPET="${PDF_HTML_SNIPPET}<a href='./academic/${filename}' target='_blank' class='flex items-center p-3 rounded-lg border border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-sm text-slate-600 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 font-medium'><i class='fa-solid fa-file-pdf text-red-500 mr-3 text-lg'></i>${displayname}</a>"
            done
            PDF_HTML_SNIPPET="${PDF_HTML_SNIPPET}</div></div>"
          fi

          # 定位 API 入口
          API_INDEX=$(find "$PUB/api" -name "index.html" | grep -v "settings.html" | head -n 1)
          API_PATH=${API_INDEX#$PUB/}

          # 生成归档链接
          ARCHIVE_SNIPPET=$( [ -d "$PUB/archive" ] && ls "$PUB/archive" | xargs -I {} echo "<a href='./archive/{}/guide/' class='flex items-center text-sm text-slate-600 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors'><i class='fa-solid fa-code-commit text-slate-400 mr-3 w-4 text-center'></i>版本 {} 存档</a>" || echo "<span class='text-sm text-slate-400 italic flex items-center'><i class='fa-solid fa-circle-info mr-2'></i>暂无历史归档记录。</span>" )

          # 写入构建时间戳
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")
          TIMESTAMP_SNIPPET="<span class='text-xs text-slate-400 mt-2 block'>构建时间: ${BUILD_TIME}</span>"

          sed -e "s|{{API_PATH}}|${API_PATH:-api/index.html}|g" \
              -e "/<!-- ACADEMIC_REPORTS_PLACEHOLDER -->/r /dev/stdin" \
              -e "s|<!-- ARCHIVE_LIST_PLACEHOLDER -->|${ARCHIVE_SNIPPET}|g" \
              -e "s|<!-- BUILD_TIMESTAMP_PLACEHOLDER -->|${TIMESTAMP_SNIPPET}|g" \
              docs/templates/index.html > "$PUB/index.html" << EOR
          ${PDF_HTML_SNIPPET}
          EOR

          # 输出结果
          mv "$PUB" deployment_payload

      - name: Upload Final Site
        uses: actions/upload-pages-artifact@v3
        with:
          path: deployment_payload/

  # 4. 自动部署到 GitHub Pages
  deploy:
    name: Deploy to Pages
    needs: deploy-site
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 5. PR 预览 (仅构建，生成预览链接)
  pr-preview:
    name: PR Preview
    needs: [build-docs, build-academic]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Docs Artifacts
        uses: actions/download-artifact@v4
        with:
          name: docs-html
          path: site-temp

      - name: Assemble Preview Site
        run: |
          PUB="public_html"
          mkdir -p "$PUB/guide" "$PUB/api"

          cp -r site-temp/docs/book/* "$PUB/guide/"
          cp -r site-temp/target/doc/* "$PUB/api/"

          API_INDEX=$(find "$PUB/api" -name "index.html" | grep -v "settings.html" | head -n 1)
          API_PATH=${API_INDEX#$PUB/}

          sed -e "s|{{API_PATH}}|${API_PATH:-api/index.html}|g" \
              -e "s|<!-- ARCHIVE_LIST_PLACEHOLDER -->|<span class='text-sm text-slate-400 italic flex items-center'><i class='fa-solid fa-circle-info mr-2'></i>PR 预览模式 — 归档仅在 main 分支可用。</span>|g" \
              -e "s|<!-- ACADEMIC_REPORTS_PLACEHOLDER -->|<div class='mt-6 pt-6 border-t border-slate-200 dark:border-slate-700'><span class='text-sm text-slate-400 italic'>学术报告仅随 main 分支发布。</span></div>|g" \
              -e "s|<!-- BUILD_TIMESTAMP_PLACEHOLDER -->|<span class='text-xs text-slate-400 mt-2 block'>PR 预览构建</span>|g" \
              docs/templates/index.html > "$PUB/index.html"

      - name: Upload Preview Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview
          path: public_html/
          retention-days: 7
