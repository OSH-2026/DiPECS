# 性能与资源守卫 (Performance & Resource Guard)
name: Performance-Bench

on:
  pull_request:
    branches: [ main ]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '.github/workflows/bench.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.95.0"
  NDK_VERSION: "r27d"
  ANDROID_API: 33

jobs:
  # 1. Android 二进制膨胀审计 (Target-Specific Anti-Bloat)
  # 重点关注 aarch64-linux-android 上的真实体积表现
  bloat-android:
    name: Android Binary Size (AArch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android

      # 使用预编译二进制加速安装
      # 注：DHAT 在 Rust 侧是 `dhat` 库 crate (作为 dev-dep + #[global_allocator] 实现堆分析)
      # 通过 `cargo test --features dhat-on` 触发，无需在此安装。
      - name: Install Tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-bloat

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/android-ndk-${{ env.NDK_VERSION }}
          key: ndk-linux-${{ env.NDK_VERSION }}
      
      - name: Install Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ndk-download && cd ndk-download
          wget -q https://dl.google.com/android/repository/android-ndk-${{ env.NDK_VERSION }}-linux.zip
          unzip -q android-ndk-${{ env.NDK_VERSION }}-linux.zip
          mv android-ndk-${{ env.NDK_VERSION }} ${{ github.workspace }}/android-ndk-${{ env.NDK_VERSION }}

      - name: Setup NDK Env
        run: |
          NDK_PATH="${{ github.workspace }}/android-ndk-${{ env.NDK_VERSION }}"
          TOOLCHAIN_BIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLCHAIN_BIN/aarch64-linux-android${{ env.ANDROID_API }}-clang" >> $GITHUB_ENV
          echo "CC=$TOOLCHAIN_BIN/aarch64-linux-android${{ env.ANDROID_API }}-clang" >> $GITHUB_ENV
          echo "$TOOLCHAIN_BIN" >> $GITHUB_PATH

      - name: Inspect Android Bloat
        run: |
          echo "### Android Binary Size Analysis (aarch64)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cargo bloat --release -n 20 --target aarch64-linux-android >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # 2. 堆分配监控
  # 使用 DHAT 监控处理路径中的分配次数
  alloc-check:
    name: Zero-Allocation Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run DHAT Profiling
        run: |
          echo "Running DHAT instrumentation..."
          # 运行带有 dhat-rs feature 的测试或示例
          # 建议在 aios-core 中通过 feature 开启 DHAT
          cargo test --workspace --features dhat-on -- --ignored || echo "DHAT profiling skipped: feature 'dhat-on' not yet implemented in codebase."

  # 3. 性能基准测试
  criterion:
    name: Criterion Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run Benchmarks
        run: cargo bench --workspace --all-targets -- --test
