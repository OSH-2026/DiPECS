# 性能与资源守卫 (Performance & Resource Guard)
name: Performance-Bench

on:
  # 完整 LSApp train+eval 消融刻意不在 CI 跑：release 冷编译依赖链约 55 分钟，
  # 远超快速反馈预算。它现在是本地专用（crates/aios-cli/tests/next_app_ablation_test.rs,
  # #[ignore]）。CI 只保留秒级的 PreWarm 回归和 StrongBaseline smoke。
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ main ]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '.github/workflows/bench.yml'
      # Evidence-only changes must still run the data-quality and baseline
      # guards, otherwise committed reports/fixtures could regress silently.
      - 'data/evaluation/**'
      - 'scripts/ci/**'
      - 'docs/**'

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.95.0"
  NDK_VERSION: "r27d"
  ANDROID_API: 33

jobs:
  # 0. 数据质量守卫：阻止低质量/硬编码数据被当作成果进入 main
  data-quality-guard:
    name: Evaluation Data Quality Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Block hard-coded action-value claims
        run: |
          # Scan every committed evaluation JSON, not just the synthetic report:
          # any benefit field at any depth must carry a source annotation.
          python3 scripts/ci/check_action_value_quality.py --dir data/evaluation
          echo "Action-value data quality check passed."

  # 1. Android 二进制膨胀审计 (Target-Specific Anti-Bloat)
  # 重点关注 aarch64-linux-android 上的真实体积表现
  bloat-android:
    name: Android Binary Size (AArch64)
    runs-on: ubuntu-latest
    needs: data-quality-guard
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android

      # 使用预编译二进制加速安装
      # 注：DHAT 在 Rust 侧是 `dhat` 库 crate (作为 dev-dep + #[global_allocator] 实现堆分析)
      # 通过 `cargo test --features dhat-on` 触发，无需在此安装。
      - name: Install Tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-bloat

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/android-ndk-${{ env.NDK_VERSION }}
          key: ndk-linux-${{ env.NDK_VERSION }}
      
      - name: Install Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ndk-download && cd ndk-download
          wget -q https://dl.google.com/android/repository/android-ndk-${{ env.NDK_VERSION }}-linux.zip
          unzip -q android-ndk-${{ env.NDK_VERSION }}-linux.zip
          mv android-ndk-${{ env.NDK_VERSION }} ${{ github.workspace }}/android-ndk-${{ env.NDK_VERSION }}

      - name: Setup NDK Env
        run: |
          NDK_PATH="${{ github.workspace }}/android-ndk-${{ env.NDK_VERSION }}"
          TOOLCHAIN_BIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLCHAIN_BIN/aarch64-linux-android${{ env.ANDROID_API }}-clang" >> $GITHUB_ENV
          echo "CC=$TOOLCHAIN_BIN/aarch64-linux-android${{ env.ANDROID_API }}-clang" >> $GITHUB_ENV
          echo "$TOOLCHAIN_BIN" >> $GITHUB_PATH

      - name: Inspect Android Bloat
        run: |
          echo "### Android Binary Size Analysis (aarch64)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cargo bloat --release -n 20 --target aarch64-linux-android >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # 2. 堆分配监控
  # 使用 DHAT 监控处理路径中的分配次数
  alloc-check:
    name: Zero-Allocation Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run DHAT Profiling
        run: |
          echo "Running DHAT instrumentation..."
          # 运行带有 dhat-rs feature 的测试或示例
          # 建议在 aios-core 中通过 feature 开启 DHAT
          cargo test --workspace --features dhat-on -- --ignored || echo "DHAT profiling skipped: feature 'dhat-on' not yet implemented in codebase."

  # 3. 性能基准测试
  criterion:
    name: Criterion Benchmark
    runs-on: ubuntu-latest
    needs: data-quality-guard
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true # cargo bench --all-targets 会执行读取 jsonl 语料的集成测试(如 noop_rate_test),需取真实 LFS 内容而非指针
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run Benchmarks
        run: cargo bench --workspace --all-targets -- --test

  # 4. 动作收益与强基线守卫
  # 目标：确保 PreWarm 等动作的真实收益不会被后续 PR 无意中回退；
  #       失败时必须在 PR 中显式说明 trade-off 并更新文档/阈值。
  action-benefit-guard:
    name: Action Benefit Baseline Guard
    runs-on: ubuntu-latest
    needs: data-quality-guard
    # 兜底：任何步骤挂死都在 15 分钟内失败并给出日志，而不是拖到默认 6 小时。
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
          # LSApp lives in third_party/LSApp; the optional ablation lane prepares
          # data/lsapp/lsapp.tsv from that submodule before running the gate.
          submodules: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      # A. PreWarm UX 收益回归（真实测量，必须绿）
      # 失败语义：PreWarm 收益被回退，必须修复或 PR 显式说明 trade-off。
      - name: PreWarm UX Benefit Regression
        run: |
          cargo nextest run -p aios-cli --test ux_metrics_dataset_test \
            -- ux_metrics_prewarm_shows_no_regression \
            --nocapture

      # B. 完整 LSApp 个性化消融 —— 本地专用，不在 CI 跑。
      # 该 gate 冷编译 release 依赖链约 55 分钟，远超 CI 快速反馈预算。它现在是
      # 本地 #[ignore] 测试，本地跑法（release + --ignored）见文件头文档：
      # crates/aios-cli/tests/next_app_ablation_test.rs。基线数字通过重生成
      # committed report 保护，回归由下面的 smoke 兜底。

      # C. 强基线集成 smoke：默认 CI 不跑完整 LSApp 训练，但必须确认
      # StrongPredictiveActionBaseline 代码和 committed LSApp report 接线没有回退。
      - name: StrongPredictiveActionBaseline Report Guard
        run: |
          cargo test -p aios-cli --lib next_app::strong_baseline -- --nocapture
          cargo test -p aios-cli --lib next_app::net_benefit -- --nocapture
          cargo test -p aios-cli --test next_app_net_benefit_test -- --nocapture
